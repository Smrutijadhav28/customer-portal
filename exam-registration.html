<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<!-- Intl Phone -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f4f6f9;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.left {
    width: 50%;
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
.left img {
    width: 300px;
}
.left h2 {
    margin-top: 20px;
}

/* RIGHT PANEL */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 400px;
    padding: 30px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Floating Labels */
.field {
    position: relative;
    margin-bottom: 20px;
}
.field input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
.field label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    background: white;
    padding: 0 5px;
    color: #777;
    transition: 0.2s;
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #0b5cab;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: #0b5cab;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* Steps */
.step {
    display: none;
    animation: fadeIn 0.4s ease;
}
.active {
    display: block;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* Error */
.error {
    color: red;
    font-size: 12px;
}

/* Mobile */
@media(max-width:768px){
    .container {
        flex-direction: column;
    }
    .left {
        display:none;
    }
    .right {
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<h2>Secure Student Portal</h2>
<p>Register for Exams Seamlessly</p>
</div>

<!-- RIGHT -->
<div class="right">
<div class="card">

<h2>Student Registration</h2>

<!-- STEP 1 -->
<div id="step1" class="step active">

<div class="field">
<input type="text" id="name" placeholder=" " />
<label>Full Name</label>
<div id="nameError" class="error"></div>
</div>

<div class="field">
<input type="text" id="email" placeholder=" " />
<label>Email</label>
<div id="emailError" class="error"></div>
</div>

<div class="field">
<input type="tel" id="phone" placeholder=" ">
<label>Phone</label>
<div id="phoneError" class="error"></div>
</div>

<button class="btn" onclick="sendOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<div class="field">
<input type="text" id="otp" placeholder=" ">
<label>Enter OTP (222222)</label>
<div id="otpError" class="error"></div>
</div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- STEP 3 -->
<div id="step3" class="step">

<p>🎉 You're verified! Complete your registration.</p>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>
</div>

</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

const iti = window.intlTelInput(document.querySelector("#phone"), {
initialCountry: "in",
separateDialCode: true
});

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

function sendOTP(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;

let valid = true;

if(!name){
document.getElementById("nameError").innerText="Required";
valid=false;
}else document.getElementById("nameError").innerText="";

if(!emailPattern.test(email)){
document.getElementById("emailError").innerText="Invalid Email";
valid=false;
}else document.getElementById("emailError").innerText="";

if(phone.length < 8){
document.getElementById("phoneError").innerText="Invalid number";
valid=false;
}else document.getElementById("phoneError").innerText="";

if(valid){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}

}

function verifyOTP(){
if(document.getElementById("otp").value==="222222"){
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
}else{
document.getElementById("otpError").innerText="Invalid OTP";
}
}

function submitForm(){
alert("Application Submitted Successfully!");
}

</script>

</body>
</html>
