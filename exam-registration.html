<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Admission Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <h1>National College Admission Portal</h1>
</header>

<div class="container">
    <form id="applicationForm" class="form-card">

        <h2>Application Form</h2>

        <!-- Student Info -->
        <h3>Student Information</h3>

        <div class="row">
            <div class="input-group">
                <label>First Name *</label>
                <input type="text" id="firstName">
                <small class="error" id="firstNameError"></small>
            </div>

            <div class="input-group">
                <label>Last Name *</label>
                <input type="text" id="lastName">
                <small class="error" id="lastNameError"></small>
            </div>
        </div>

        <div class="input-group">
            <label>Email *</label>
            <input type="text" id="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="input-group">
            <label>Phone Number *</label>
            <input type="text" id="phone">
            <small class="error" id="phoneError"></small>
        </div>

        <!-- Address -->
        <h3>Address Details</h3>

        <div class="input-group">
            <label>Street Address</label>
            <input type="text" id="address">
        </div>

        <div class="row">
            <div class="input-group">
                <label>City *</label>
                <input type="text" id="city">
                <small class="error" id="cityError"></small>
            </div>

            <div class="input-group">
                <label>State *</label>
                <input type="text" id="state">
                <small class="error" id="stateError"></small>
            </div>
        </div>

        <div class="input-group">
            <label>Pin Code *</label>
            <input type="text" id="pincode">
            <small class="error" id="pincodeError"></small>
        </div>

        <!-- Application -->
        <h3>Application Details</h3>

        <div class="input-group">
            <label>Course *</label>
            <select id="course">
                <option value="">Select Course</option>
                <option>B.Tech</option>
                <option>BBA</option>
                <option>BCA</option>
            </select>
            <small class="error" id="courseError"></small>
        </div>

        <button type="submit" class="submit-btn">Submit Application</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
