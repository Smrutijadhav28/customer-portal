<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css"/>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#eef2f7;
}

/* HEADER */
.header{
padding:15px 40px;
background:white;
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
font-weight:600;
}

/* LAYOUT */
.container{
display:flex;
justify-content:space-around;
align-items:center;
height:90vh;
}

/* LEFT */
.left{
text-align:center;
}

.left img{
width:220px;
}

/* RIGHT CARD */
.card{
background:white;
padding:30px;
border-radius:12px;
width:350px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* STEPS */
.steps{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.step{
width:30px;
height:30px;
border-radius:50%;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.active{
background:#0b5cab;
color:white;
}

/* INPUT */
.input{
width:100%;
height:45px;
margin:10px 0;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* PHONE */
.phone-input{
width:100%;
height:45px;
padding-left:60px !important;
border:1px solid #ccc;
border-radius:6px;
}

.iti{
width:100%;
}

/* BUTTON */
.btn{
width:100%;
height:45px;
background:#0b5cab;
color:white;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

/* OTP */
.otp{
display:flex;
justify-content:space-between;
}

.otp input{
width:40px;
height:45px;
text-align:center;
font-size:18px;
}

/* ERROR */
.error{
color:red;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<div>Student Portal</div>
<div>A A+ A++</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<h3>Secure Student Portal</h3>
<p>Register for Exams Seamlessly</p>
</div>

<!-- RIGHT -->
<div class="card">

<div class="steps">
<div class="step active" id="s1">1</div>
<div class="step" id="s2">2</div>
<div class="step" id="s3">3</div>
</div>

<!-- STEP 1 -->
<div id="step1">
<input class="input" id="name" placeholder="Full Name">
<div class="error" id="nameError"></div>

<input class="input" id="email" placeholder="Email">
<div class="error" id="emailError"></div>

<label style="font-size:13px;">Phone Number</label>
<input id="phone" type="tel" class="phone-input">
<div class="error" id="phoneError"></div>

<button class="btn" onclick="goToOTP()">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<h4>Enter OTP</h4>

<div class="otp">
<input maxlength="1" oninput="move(this,0)">
<input maxlength="1" oninput="move(this,1)">
<input maxlength="1" oninput="move(this,2)">
<input maxlength="1" oninput="move(this,3)">
<input maxlength="1" oninput="move(this,4)">
<input maxlength="1" oninput="move(this,5)">
</div>

<div class="error" id="otpError"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
<h4>Exam Registration</h4>

<select class="input">
<option>B.Tech</option>
<option>MBA</option>
</select>

<input type="date" class="input">

<select class="input">
<option>Mumbai</option>
<option>Pune</option>
</select>

<button class="btn">Submit Application</button>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>

<script>
const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput,{
initialCountry:"in",
separateDialCode:true,
utilsScript:"https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
});

/* VALIDATION STEP 1 */
function goToOTP(){
let valid=true;

if(document.getElementById("name").value===""){
document.getElementById("nameError").innerText="Required";
valid=false;
}else document.getElementById("nameError").innerText="";

if(!document.getElementById("email").value.includes("@")){
document.getElementById("emailError").innerText="Invalid email";
valid=false;
}else document.getElementById("emailError").innerText="";

if(!iti.isValidNumber()){
document.getElementById("phoneError").innerText="Invalid phone";
valid=false;
}else document.getElementById("phoneError").innerText="";

if(valid){
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

document.getElementById("s1").classList.remove("active");
document.getElementById("s2").classList.add("active");
}
}

/* OTP INPUT MOVE */
function move(el,i){
let inputs=document.querySelectorAll(".otp input");
if(el.value && i<5) inputs[i+1].focus();
}

/* VERIFY OTP */
function verifyOTP(){
let otp="";
document.querySelectorAll(".otp input").forEach(i=>otp+=i.value);

if(otp==="222222"){
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

document.getElementById("s2").classList.remove("active");
document.getElementById("s3").classList.add("active");
}else{
document.getElementById("otpError").innerText="Invalid OTP";
}
}
</script>

</body>
</html>
