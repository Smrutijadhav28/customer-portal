<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<!-- Phone input -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-weight: bold;
    color: #e60023;
    font-size: 20px;
}

.top-actions {
    display: flex;
    gap: 10px;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 70px);
}

/* LEFT PANEL */
.left {
    width: 55%;
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.left img {
    width: 350px;
}

.left-text {
    margin-top: 20px;
    text-align: center;
}

/* RIGHT PANEL */
.right {
    width: 45%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.1);
}

/* TABS */
.tabs {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    border-bottom: 2px solid #eee;
}

.tab {
    padding-bottom: 8px;
    cursor: pointer;
    color: #666;
}

.tab.active {
    border-bottom: 2px solid #0b5cab;
    color: #0b5cab;
    font-weight: bold;
}

/* INPUTS */
.input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #0b5cab;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* ERROR */
.error {
    color: red;
    font-size: 12px;
}

/* STEPS */
.step {
    display: none;
}
.step.active {
    display: block;
}

/* PHONE FIX */
.iti {
    width: 100%;
}
.iti input {
    width: 100%;
    height: 45px;
    padding-left: 55px !important;
}

/* MOBILE */
@media(max-width:768px){
    .container {
        flex-direction: column;
    }
    .left {
        display: none;
    }
    .right {
        width: 100%;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">kotak</div>
    <div class="top-actions">
        <span>A</span>
        <span>A+</span>
        <span>A++</span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

<!-- LEFT -->
<div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="left-text">
        <h3>Secure Student Portal</h3>
        <p>Register for Exams Seamlessly</p>
    </div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="card">

<h2>Welcome</h2>

<!-- TABS -->
<div class="tabs">
    <div class="tab">Login</div>
    <div class="tab active">Register</div>
</div>

<!-- STEP 1 -->
<div id="step1" class="step active">

<input type="text" id="name" class="input" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input type="text" id="email" class="input" placeholder="Email">
<div id="emailError" class="error"></div>

<input type="tel" id="phone" class="input" placeholder="Phone Number">
<div id="phoneError" class="error"></div>

<button class="btn" onclick="goToOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<input type="text" id="otp" class="input" placeholder="Enter OTP (222222)">
<div id="otpError" class="error"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- STEP 3 -->
<div id="step3" class="step">

<p style="color:green;">OTP Verified Successfully</p>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>

</div>

</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

const phoneInput = window.intlTelInput(document.querySelector("#phone"), {
initialCountry: "in",
separateDialCode: true
});

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

function goToOTP(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;

let valid = true;

if(!name){
document.getElementById("nameError").innerText="Required";
valid=false;
}else document.getElementById("nameError").innerText="";

if(!emailPattern.test(email)){
document.getElementById("emailError").innerText="Invalid Email";
valid=false;
}else document.getElementById("emailError").innerText="";

if(phone.length < 8){
document.getElementById("phoneError").innerText="Invalid number";
valid=false;
}else document.getElementById("phoneError").innerText="";

if(valid){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}

}

function verifyOTP(){
if(document.getElementById("otp").value === "222222"){
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
}else{
document.getElementById("otpError").innerText="Invalid OTP";
}
}

function submitForm(){
alert("Application Submitted Successfully!");
}

</script>

</body>
</html>
