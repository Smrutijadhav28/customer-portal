<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#f4f6f9;
}

/* LEFT */
.left{
flex:1;
background:linear-gradient(135deg,#3b82f6,#1e3a8a);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
}

.left h1{font-size:42px;}
.left li{margin:10px 0;}

/* RIGHT */
.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* STEPS */
.steps{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.step{
width:30px;height:30px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
}

.active{
background:#2563eb;
color:white;
}

/* FORM */
.group{
margin-bottom:16px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#ff5a3c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* MOBILE GROUP */
.mobile-wrap{
display:flex;
gap:8px;
}

.mobile-wrap select{
width:35%;
}

.mobile-wrap input{
width:65%;
}

/* OTP */
.otp{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.otp input{
width:45px;
height:45px;
text-align:center;
font-size:18px;
border-radius:8px;
}

/* ERROR */
.error{
color:red;
font-size:12px;
margin-top:4px;
display:none;
text-align:left;
}
</style>
</head>

<body>

<div class="left">
<h1>Register for Exams Easily</h1>
<ul>
<li>✔ Instant OTP</li>
<li>✔ 100+ Colleges</li>
<li>✔ Fast Process</li>
</ul>
</div>

<div class="right">
<div class="card">

<div class="steps">
<div id="s1" class="step active">1</div>
<div id="s2" class="step">2</div>
<div id="s3" class="step">3</div>
</div>

<!-- STEP 1 -->
<div id="step1">
<h3>Get Started</h3>

<div class="group">
<input id="name" placeholder="Full Name">
<div id="errName" class="error">Required</div>
</div>

<div class="group">
<input id="email" placeholder="Email">
<div id="errEmail" class="error">Invalid email</div>
</div>

<div class="group">
<div class="mobile-wrap">
<select id="country" onchange="updateMobileLimit()">
<option value="91" data-len="10">🇮🇳 +91</option>
<option value="1" data-len="10">🇺🇸 +1</option>
<option value="44" data-len="10">🇬🇧 +44</option>
</select>

<input id="mobile" placeholder="Mobile Number">
</div>
<div id="errMobile" class="error">Invalid mobile</div>
</div>

<button onclick="goStep2()">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<h3 style="text-align:center;">Enter OTP</h3>

<div class="otp" id="otpBox">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<div id="errOtp" class="error" style="text-align:center;">Invalid OTP</div>

<button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
<h3>Exam Registration</h3>

<div class="group">
<select id="course">
<option value="">Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
</select>
<div id="errCourse" class="error">Required</div>
</div>

<div class="group">
<input type="date" id="dob">
<div id="errDob" class="error">Required</div>
</div>

<div class="group">
<select id="city">
<option value="">Select City</option>
<option>Mumbai</option>
<option>Pune</option>
</select>
<div id="errCity" class="error">Required</div>
</div>

<button onclick="submitForm()">Submit</button>
</div>

</div>
</div>

<script>

let generatedOTP="";
let mobileLength=10;

/* COUNTRY BASED LIMIT */
function updateMobileLimit(){
let sel=document.getElementById("country");
mobileLength=sel.options[sel.selectedIndex].dataset.len;
}

/* STEP 1 */
function goStep2(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value;
let mobile=document.getElementById("mobile").value;

document.getElementById("errName").style.display=!name?"block":"none";
document.getElementById("errEmail").style.display=!email.includes("@")?"block":"none";
document.getElementById("errMobile").style.display=(mobile.length!=mobileLength)?"block":"none";

if(!name || !email.includes("@") || mobile.length!=mobileLength){
return;
}

generatedOTP=(Math.floor(100000+Math.random()*900000)).toString();
console.log("OTP:",generatedOTP);

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

document.getElementById("s1").classList.remove("active");
document.getElementById("s2").classList.add("active");

/* OTP UX */
let inputs=document.querySelectorAll("#otpBox input");

inputs.forEach((input,i)=>{
input.value="";
input.oninput=()=>{
if(input.value && i<5) inputs[i+1].focus();
};
input.onkeydown=(e)=>{
if(e.key==="Backspace" && !input.value && i>0){
inputs[i-1].focus();
}
};
});

}

/* VERIFY OTP */
function verifyOTP(){

let inputs=document.querySelectorAll("#otpBox input");
let entered=[...inputs].map(i=>i.value).join("");

if(entered.length!=6){
showErr("errOtp","Enter 6 digit OTP");
return;
}

if(entered!==generatedOTP){
showErr("errOtp","Incorrect OTP");
return;
}

hideErr("errOtp");

document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

document.getElementById("s2").classList.remove("active");
document.getElementById("s3").classList.add("active");
}

/* STEP 3 */
function submitForm(){

let course=document.getElementById("course").value;
let dob=document.getElementById("dob").value;
let city=document.getElementById("city").value;

document.getElementById("errCourse").style.display=!course?"block":"none";
document.getElementById("errDob").style.display=!dob?"block":"none";
document.getElementById("errCity").style.display=!city?"block":"none";

if(!course || !dob || !city){
return;
}

alert("Application Submitted");
location.reload();
}

/* HELPERS */
function showErr(id,msg){
let el=document.getElementById(id);
el.innerText=msg;
el.style.display="block";
}

function hideErr(id){
document.getElementById(id).style.display="none";
}

</script>

</body>
</html>
