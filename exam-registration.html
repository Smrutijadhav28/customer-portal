<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#eef2f6;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
font-weight:600;
}

/* LAYOUT */
.container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
gap:100px;
}

/* LEFT */
.left{
text-align:center;
}
.left img{
width:260px;
}
.left h2{
margin-top:15px;
}
.left p{
color:#666;
}

/* CARD */
.card{
width:380px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* STEPPER */
.stepper{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}
.step{
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
}
.active{
background:#1f5ea8;
color:white;
}

/* INPUT */
.input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* PHONE */
.phone{
display:flex;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
margin-top:10px;
}
.phone select{
border:none;
padding:10px;
background:#f5f5f5;
}
.phone input{
border:none;
padding:10px;
flex:1;
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
margin-top:15px;
background:#1f5ea8;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

/* OTP */
.otp{
display:flex;
justify-content:space-between;
}
.otp input{
width:40px;
height:45px;
text-align:center;
font-size:18px;
}

/* SUCCESS */
.success{
color:green;
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div>Student Portal</div>
<div>A A+ A++</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<h2>Secure Student Portal</h2>
<p>Register for Exams Seamlessly</p>
</div>

<!-- RIGHT -->
<div class="card">

<!-- STEPPER -->
<div class="stepper">
<div id="s1" class="step active">1</div>
<div id="s2" class="step">2</div>
<div id="s3" class="step">3</div>
</div>

<!-- STEP 1 -->
<div id="step1">
<input type="text" class="input" placeholder="Full Name" required>
<input type="email" class="input" placeholder="Email" required>

<div class="phone">
<select>
<option>IN +91</option>
<option>US +1</option>
</select>
<input type="tel" maxlength="10" placeholder="Enter Mobile Number" id="mobile">
</div>

<button class="btn" onclick="goStep2()">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<h4>Enter OTP</h4>

<div class="otp">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

<div id="successMsg" class="success" style="display:none;">
OTP Verified Successfully
</div>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
<h4>Exam Registration</h4>

<select class="input" required>
<option value="" disabled selected>Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
<option>B.Com</option>
</select>

<input type="date" class="input" required>

<select class="input" required>
<option value="" disabled selected>Select Course City</option>
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
<option>Bangalore</option>
</select>

<button class="btn">Submit Application</button>
</div>

</div>
</div>

<script>

// STEP 1 → STEP 2
function goStep2(){
let mobile = document.getElementById("mobile").value;

if(mobile.length !== 10){
alert("Enter valid 10 digit mobile number");
return;
}

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

document.getElementById("s1").classList.remove("active");
document.getElementById("s2").classList.add("active");
}

// OTP AUTO FOCUS
document.querySelectorAll(".otp input").forEach((input,index,arr)=>{
input.addEventListener("input",()=>{
if(input.value && index<5){
arr[index+1].focus();
}
});
});

// VERIFY OTP
function verifyOTP(){
document.getElementById("successMsg").style.display="block";

setTimeout(()=>{
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

document.getElementById("s2").classList.remove("active");
document.getElementById("s3").classList.add("active");
},1000);
}

</script>

</body>
</html>
