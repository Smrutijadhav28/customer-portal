<!DOCTYPE html>
<html>
<head>
  <title>Exam Registration</title>

  <style>
    /* KEEPING SIMPLE DEFAULT STYLE (no major UI change) */
    body { font-family: Arial; margin: 40px; }
    input, select { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    button { padding: 10px; }
    .hidden { display: none; }
    .enabled { background-color: #28a745; color: white; }
  </style>

</head>

<body>

<h2>Get Started</h2>

<!-- Step 1 -->
<div id="step1">

  <input id="name" placeholder="Name" oninput="validate()">

  <input id="email" placeholder="Email" oninput="validate()">

  <select id="code">
    <option value="+91" data-len="10">IN +91</option>
    <option value="+1" data-len="10">US +1</option>
    <option value="+44" data-len="10">UK +44</option>
  </select>

  <input id="mobile" placeholder="Mobile Number">

  <button id="btn1" onclick="next1()" disabled>Continue</button>

</div>

<!-- Step 2 -->
<div id="step2" class="hidden">
  <h3>Step 2 - OTP Screen</h3>
</div>

<script>

let btn = document.getElementById("btn1");

// -------- VALIDATION --------

function validate(){
  let valid = nameVal() && emailVal() && mobileVal();
  btn.disabled = !valid;
  btn.classList.toggle("enabled", valid);
}

function nameVal(){
  return document.getElementById("name").value.trim().length > 2;
}

function emailVal(){
  return /\S+@\S+\.\S+/.test(document.getElementById("email").value);
}

// ✅ UPDATED MOBILE VALIDATION (ONLY IMPORTANT CHANGE)
function mobileVal(){
  let code = document.getElementById("code").value;
  let mobile = document.getElementById("mobile").value.trim();

  // Only digits allowed
  if (!/^[0-9]+$/.test(mobile)) return false;

  if(code === "+91" || code === "+1"){
    return mobile.length === 10;
  }

  if(code === "+44"){
    // UK supports 07xxxxxxxx OR 7xxxxxxxxx
    if(mobile.startsWith("0")){
      return mobile.length === 11;
    }
    return mobile.length === 10;
  }

  return false;
}

// -------- INPUT CONTROL --------

// Restrict input while typing
document.getElementById("mobile").addEventListener("input", function() {
  let code = document.getElementById("code").value;

  // Remove non-numeric
  this.value = this.value.replace(/\D/g, '');

  let maxLen = 10;

  // UK special case
  if(code === "+44" && this.value.startsWith("0")){
    maxLen = 11;
  }

  if(this.value.length > maxLen){
    this.value = this.value.slice(0, maxLen);
  }

  validate();
});

// Revalidate on country change
document.getElementById("code").addEventListener("change", function(){
  document.getElementById("mobile").value = "";
  validate();
});

// -------- STEP NAVIGATION --------

function next1(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

</script>

</body>
</html>
