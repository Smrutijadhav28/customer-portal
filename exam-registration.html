<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f4f6f9;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:16px 40px;
background:white;
border-bottom:1px solid #ddd;
}

/* LAYOUT */
.container{
display:flex;
height:calc(100vh - 60px);
}

.left{
width:55%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#eef2f7;
}

.right{
width:45%;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:420px;
padding:30px;
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

/* STEPPER */
.stepper{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}
.step-indicator{
width:34px;
height:34px;
border-radius:50%;
background:#ccc;
text-align:center;
line-height:34px;
}
.active-step{
background:#0b5cab;
color:white;
}

/* STEPS */
.step{display:none;}
.active{display:block;}

/* FLOAT LABEL */
.field{
position:relative;
margin-top:18px;
}

.field input, .field select{
width:100%;
height:48px;
border:1px solid #ccc;
border-radius:6px;
padding:12px;
font-size:14px;
outline:none;
}

.field label{
position:absolute;
top:50%;
left:12px;
transform:translateY(-50%);
background:white;
padding:0 5px;
color:#888;
transition:0.2s;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label{
top:-8px;
font-size:12px;
color:#0b5cab;
}

/* BUTTON */
.btn{
width:100%;
height:48px;
margin-top:20px;
background:#0b5cab;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* OTP */
.otp-container{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}
.otp-box{
width:50px;
height:55px;
text-align:center;
font-size:20px;
border:1px solid #ccc;
border-radius:8px;
}

/* STATES */
.error{color:red;font-size:12px;}
.success{color:green;text-align:center;margin-top:10px;}

/* PHONE FIX */
.iti{width:100%;}
.iti input{
height:48px;
padding-left:55px !important;
cursor:text;
}

/* MOBILE */
@media(max-width:768px){
.container{flex-direction:column;}
.left{display:none;}
.right{width:100%;}
}
</style>
</head>

<body>

<div class="header">
<div><b>Student Portal</b></div>
<div>A A+ A++</div>
</div>

<div class="container">

<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="280">
<h3>Secure Student Portal</h3>
<p>Register for Exams Seamlessly</p>
</div>

<div class="right">

<div class="card">

<div class="stepper">
<div id="s1" class="step-indicator active-step">1</div>
<div id="s2" class="step-indicator">2</div>
<div id="s3" class="step-indicator">3</div>
</div>

<!-- STEP 1 -->
<div id="step1" class="step active">

<div class="field">
<input id="name" placeholder=" ">
<label>Full Name</label>
</div>
<div id="nameError" class="error"></div>

<div class="field">
<input id="email" placeholder=" ">
<label>Email</label>
</div>
<div id="emailError" class="error"></div>

<div class="field">
<input id="phone" type="tel" placeholder=" ">
<label>Phone Number</label>
</div>
<div id="phoneError" class="error"></div>

<button class="btn" onclick="goToOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<h4 style="text-align:center;">Enter OTP</h4>

<div class="otp-container">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
</div>

<div id="otpError" class="error"></div>
<div id="otpSuccess" class="success"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- STEP 3 -->
<div id="step3" class="step">

<h3>Exam Registration</h3>

<div class="field">
<select required>
<option value="" disabled selected></option>
<option>B.Tech</option>
<option>MBA</option>
<option>BCA</option>
</select>
<label>Course</label>
</div>

<div class="field">
<input type="date" required>
<label>Date of Birth</label>
</div>

<div class="field">
<select required>
<option value="" disabled selected></option>
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
</select>
<label>Exam Center</label>
</div>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

/* INIT PHONE */
const phoneInput = document.querySelector("#phone");
const iti = window.intlTelInput(phoneInput,{
initialCountry:"in",
separateDialCode:true
});

/* EMAIL REGEX */
const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

/* FIXED PHONE INPUT */
phoneInput.addEventListener("input",function(){

let digits=this.value.replace(/\D/g,'');

if(digits.length>10){
digits=digits.slice(0,10);
}

if(this.value!==digits){
this.value=digits;
}

});

/* STEP 1 VALIDATION */
function goToOTP(){

let valid=true;

if(!name.value.trim()){
nameError.innerText="Required";
valid=false;
}else nameError.innerText="";

if(!emailPattern.test(email.value.trim())){
emailError.innerText="Invalid Email";
valid=false;
}else emailError.innerText="";

if(phoneInput.value.length!==10){
phoneError.innerText="Enter 10 digits";
valid=false;
}else phoneError.innerText="";

if(valid){
switchStep(1,2);
}

}

/* OTP */
const otpInputs=document.querySelectorAll(".otp-box");

otpInputs.forEach((input,i)=>{
input.addEventListener("input",()=>{
if(input.value && i<5) otpInputs[i+1].focus();
});
input.addEventListener("keydown",(e)=>{
if(e.key==="Backspace" && !input.value && i>0){
otpInputs[i-1].focus();
}
});
});

/* VERIFY OTP */
function verifyOTP(){
let otp="";
otpInputs.forEach(i=>otp+=i.value);

if(otp==="222222"){
otpSuccess.innerText="OTP Verified";
otpError.innerText="";
setTimeout(()=>switchStep(2,3),600);
}else{
otpError.innerText="Invalid OTP";
otpSuccess.innerText="";
}
}

/* SWITCH */
function switchStep(a,b){
document.getElementById("step"+a).classList.remove("active");
document.getElementById("step"+b).classList.add("active");

document.getElementById("s"+a).classList.remove("active-step");
document.getElementById("s"+b).classList.add("active-step");
}

/* SUBMIT */
function submitForm(){
alert("Application Submitted!");
}

</script>

</body>
</html>
