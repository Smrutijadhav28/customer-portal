<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Student Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f4f6f9;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:white;
    border-bottom:1px solid #ddd;
}
.logo { color:#e60023; font-weight:bold; font-size:20px; }

/* LAYOUT */
.container { display:flex; height:calc(100vh - 60px); }

/* LEFT */
.left {
    width:55%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#eef2f7;
}

/* RIGHT */
.right {
    width:45%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card {
    width:420px;
    padding:30px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

/* STEPPER */
.stepper {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}
.step-indicator {
    width:30px;
    height:30px;
    border-radius:50%;
    background:#ccc;
    text-align:center;
    line-height:30px;
}
.active-step {
    background:#0b5cab;
    color:white;
}

/* INPUT */
.input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
.btn {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0b5cab;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* OTP BOXES */
.otp-container {
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:10px;
}
.otp-box {
    width:45px;
    height:50px;
    text-align:center;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* ERROR */
.error { color:red; font-size:12px; }

/* SUCCESS */
.success { color:green; margin-top:10px; }

/* STEP */
.step { display:none; }
.active { display:block; }

/* PHONE FIX */
.iti { width:100%; }
.iti input { padding-left:55px !important; height:45px; width:100%; }

/* MOBILE */
@media(max-width:768px){
.container { flex-direction:column; }
.left { display:none; }
.right { width:100%; }
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">kotak</div>
    <div>A A+ A++</div>
</div>

<div class="container">

<div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="300">
    <h3>Secure Student Portal</h3>
</div>

<div class="right">

<div class="card">

<!-- STEPPER -->
<div class="stepper">
    <div id="s1" class="step-indicator active-step">1</div>
    <div id="s2" class="step-indicator">2</div>
    <div id="s3" class="step-indicator">3</div>
</div>

<!-- STEP 1 -->
<div id="step1" class="step active">

<input id="name" class="input" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input id="email" class="input" placeholder="Email">
<div id="emailError" class="error"></div>

<input id="phone" type="tel" class="input" placeholder="Phone Number">
<div id="phoneError" class="error"></div>

<button class="btn" onclick="goToOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<p style="text-align:center;">Enter OTP</p>

<div class="otp-container">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
</div>

<div id="otpError" class="error"></div>
<div id="otpSuccess" class="success"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- STEP 3 -->
<div id="step3" class="step">

<h3>Exam Registration</h3>

<select class="input">
<option>Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
<option>BCA</option>
</select>

<input type="date" class="input">

<select class="input">
<option>Select Center</option>
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
</select>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

/* PHONE */
window.intlTelInput(document.querySelector("#phone"), {
initialCountry:"in",
separateDialCode:true
});

/* VALIDATION */
const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

/* STEP 1 */
function goToOTP(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let valid=true;

if(!name){document.getElementById("nameError").innerText="Required"; valid=false;}
else document.getElementById("nameError").innerText="";

if(!emailPattern.test(email)){document.getElementById("emailError").innerText="Invalid Email"; valid=false;}
else document.getElementById("emailError").innerText="";

if(phone.length<8){document.getElementById("phoneError").innerText="Invalid Phone"; valid=false;}
else document.getElementById("phoneError").innerText="";

if(valid){
switchStep(1,2);
}

}

/* OTP AUTO MOVE */
const otpInputs=document.querySelectorAll(".otp-box");

otpInputs.forEach((input,index)=>{
input.addEventListener("input",()=>{
if(input.value && index<5){
otpInputs[index+1].focus();
}
});
input.addEventListener("keydown",(e)=>{
if(e.key==="Backspace" && !input.value && index>0){
otpInputs[index-1].focus();
}
});
});

/* STEP SWITCH */
function switchStep(from,to){
document.getElementById("step"+from).classList.remove("active");
document.getElementById("step"+to).classList.add("active");

document.getElementById("s"+from).classList.remove("active-step");
document.getElementById("s"+to).classList.add("active-step");
}

/* VERIFY OTP */
function verifyOTP(){

let otp="";
otpInputs.forEach(i=>otp+=i.value);

if(otp==="222222"){

document.getElementById("otpSuccess").innerText="OTP Verified Successfully";

setTimeout(()=>switchStep(2,3),1000);

}else{
document.getElementById("otpError").innerText="Invalid OTP";
}

}

/* SUBMIT */
function submitForm(){
alert("Application Submitted Successfully!");
}

</script>

</body>
</html>
