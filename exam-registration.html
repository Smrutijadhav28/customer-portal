<!DOCTYPE html>
<html>
<head>
  <title>Exam Registration</title>
  <style>
    body { font-family: Arial; display: flex; }
    .hidden { display: none; }
    .enabled { background-color: #28a745 !important; color: white; }
    button { padding: 10px; background: #ccc; border: none; }
    input, select { display: block; margin: 10px 0; padding: 8px; width: 250px; }
  </style>
</head>
<body>

<!-- Step 1 -->
<div id="step1">
  <h2>Get Started</h2>

  <input id="name" placeholder="Name" oninput="validate()">
  <input id="email" placeholder="Email" oninput="validate()">

  <select id="code">
    <option value="+91" data-len="10">IN +91</option>
    <option value="+1" data-len="10">US +1</option>
    <option value="+44" data-len="10">UK +44</option>
  </select>

  <input id="mobile" placeholder="Mobile Number">

  <button id="btn1" onclick="next1()" disabled>Continue</button>
</div>

<!-- Step 2 -->
<div id="step2" class="hidden">
  <h2>Step 2 - OTP Screen</h2>
</div>

<script>

// -------- VALIDATION FUNCTIONS --------

function nameVal(){
  return document.getElementById("name").value.trim().length > 2;
}

function emailVal(){
  return /\S+@\S+\.\S+/.test(document.getElementById("email").value);
}

function mobileVal(){
  let code = document.getElementById("code").value;
  let mobile = document.getElementById("mobile").value.trim();

  // Only digits
  if (!/^[0-9]+$/.test(mobile)) return false;

  // Country-specific rules
  if(code === "+91"){
    return mobile.length === 10;
  }

  if(code === "+1"){
    return mobile.length === 10;
  }

  if(code === "+44"){
    // Handle if user enters starting 0 (07xxxxxxx)
    if(mobile.startsWith("0")){
      mobile = mobile.substring(1);
    }
    return mobile.length === 10;
  }

  return false;
}

// -------- MAIN VALIDATION --------

function validate(){
  let valid = nameVal() && emailVal() && mobileVal();

  let btn = document.getElementById("btn1");
  btn.disabled = !valid;
  btn.classList.toggle("enabled", valid);
}

// -------- INPUT CONTROL --------

document.getElementById("mobile").addEventListener("input", function() {
  let code = document.getElementById("code").value;

  // Remove non-numeric
  this.value = this.value.replace(/\D/g, '');

  // Max length control
  let maxLen = 10;

  if(code === "+44" && this.value.startsWith("0")){
    maxLen = 11; // allow 0 + 10 digits
  }

  if(this.value.length > maxLen){
    this.value = this.value.slice(0, maxLen);
  }

  validate();
});

// Revalidate on country change
document.getElementById("code").addEventListener("change", function(){
  document.getElementById("mobile").value = ""; // reset mobile
  validate();
});

// -------- STEP NAVIGATION --------

function next1(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

</script>

</body>
</html>
