<!DOCTYPE html>
<html>
<head>
    <title>College Application Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
        }
        .container {
            width: 800px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        h3 {
            margin-top: 25px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row div {
            flex: 1;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
        }
        .btn-updated {
            background: #28a745;
        }
    </style>
</head>

<body>

<div class="container">

<h2>College Application Form</h2>

<!-- Student Info -->
<h3>Student Information</h3>

<div class="row">
    <div>
        <label>First Name</label>
        <input type="text" id="firstName">
    </div>
    <div>
        <label>Last Name</label>
        <input type="text" id="lastName">
    </div>
</div>

<label>Email</label>
<input type="email" name="emailField">

<label>Phone Number</label>
<input type="text" id="phone">

<!-- Address -->
<h3>Address Details</h3>

<label>Street Address</label>
<input type="text" id="address">

<div class="row">
    <div>
        <label>City</label>
        <input type="text" id="city">
    </div>
    <div>
        <label>State</label>
        <input type="text" id="state">
    </div>
</div>

<label>Zip Code</label>
<input type="text" id="zip">

<!-- Application Info -->
<h3>Application Details</h3>

<label>Application Type</label>
<select id="appType">
    <option>Freshman</option>
    <option>Transfer</option>
</select>

<label>Course Applied For</label>
<select id="course">
    <option>Computer Science</option>
    <option>Business</option>
    <option>Engineering</option>
</select>

<label>Semester</label>
<select id="semester">
    <option>Fall</option>
    <option>Spring</option>
</select>

<!-- Education -->
<h3>Education Background</h3>

<label>School Name</label>
<input type="text" id="school">

<label>Year Graduated</label>
<input type="text" id="gradYear">

<label>GPA / Percentage</label>
<input type="text" id="gpa">

<!-- Additional -->
<h3>Additional Information</h3>

<label>Achievements</label>
<textarea id="achievements"></textarea>

<label>Extra Activities</label>
<textarea id="activities"></textarea>

<!-- Submit -->
<button id="submitBtn" class="btn-primary">Submit Application</button>

<p id="status"></p>

</div>

<script>

// Submit action
document.getElementById("submitBtn").onclick = function () {
    document.getElementById("status").innerText = "Application Submitted Successfully!";
};

// 🔥 Simulate real production UI change
setTimeout(() => {

    console.log("UI Update Released...");

    document.getElementById("firstName").id = "first_name_v2";
    document.getElementById("lastName").id = "last_name_v2";
    document.getElementsByName("emailField")[0].name = "email_new";
    document.getElementById("phone").id = "phone_v2";
    document.getElementById("address").id = "address_v2";
    document.getElementById("city").id = "city_v2";
    document.getElementById("state").id = "state_v2";
    document.getElementById("zip").id = "zip_v2";
    document.getElementById("appType").id = "application_type_v2";
    document.getElementById("course").id = "course_v2";
    document.getElementById("semester").id = "semester_v2";
    document.getElementById("school").id = "school_v2";
    document.getElementById("gradYear").id = "grad_year_v2";
    document.getElementById("gpa").id = "gpa_v2";
    document.getElementById("achievements").id = "achievements_v2";
    document.getElementById("activities").id = "activities_v2";

    let btn = document.getElementById("submitBtn");
    btn.id = "submit_application_v2";
    btn.className = "btn-primary btn-updated";
    btn.innerText = "Proceed";

    document.getElementById("status").innerText = "UI Updated (New Version)";

}, 8000);

</script>

</body>
</html>
