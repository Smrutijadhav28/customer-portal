<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application Form</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.22.0/styles/salesforce-lightning-design-system.min.css">

<style>
body {
    background: #f4f6f9;
    padding: 40px;
}
.container {
    max-width: 500px;
    margin: auto;
}
.hidden {
    display: none;
}
.success {
    color: green;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<form id="applicationForm" class="slds-box slds-theme_default">

<h2 class="slds-text-heading_medium slds-align_absolute-center">Application Form</h2>

<!-- Name -->
<div class="slds-form-element">
<label class="slds-form-element__label">First Name *</label>
<input type="text" id="firstName" class="slds-input"/>
<div class="slds-text-color_error" id="firstNameError"></div>
</div>

<!-- Email -->
<div class="slds-form-element">
<label class="slds-form-element__label">Email *</label>
<input type="text" id="email" class="slds-input"/>
<div class="slds-text-color_error" id="emailError"></div>
</div>

<!-- Country -->
<div class="slds-form-element">
<label class="slds-form-element__label">Country *</label>
<select id="country" class="slds-select">
<option value="">Select Country</option>
<option value="IN">India (+91)</option>
<option value="US">USA (+1)</option>
<option value="UK">UK (+44)</option>
</select>
</div>

<!-- Phone -->
<div class="slds-form-element">
<label class="slds-form-element__label">Phone *</label>
<div class="slds-grid">
<input type="text" id="countryCode" class="slds-input slds-size_1-of-4" readonly>
<input type="text" id="phone" class="slds-input slds-size_3-of-4">
</div>
<div class="slds-text-color_error" id="phoneError"></div>
</div>

<br>

<!-- Verify Button -->
<button type="button" class="slds-button slds-button_brand" onclick="showOTP()">
Verify OTP
</button>

<!-- OTP SECTION -->
<div id="otpSection" class="hidden" style="margin-top:20px;">
    <label>Enter OTP</label>
    <input type="text" id="otpInput" class="slds-input" placeholder="Enter 222222">
    <div id="otpError" class="slds-text-color_error"></div>

    <button type="button" class="slds-button slds-button_brand slds-m-top_small" onclick="verifyOTP()">
        Verify OTP
    </button>

    <div id="otpSuccess" class="success"></div>
</div>

<!-- Submit Button -->
<button id="submitBtn" type="submit" class="slds-button slds-button_success hidden slds-m-top_medium">
Submit
</button>

</form>

</div>

<script>

// Elements
const firstName = document.getElementById("firstName");
const email = document.getElementById("email");
const country = document.getElementById("country");
const phone = document.getElementById("phone");

const firstNameError = document.getElementById("firstNameError");
const emailError = document.getElementById("emailError");
const phoneError = document.getElementById("phoneError");

const otpSection = document.getElementById("otpSection");
const submitBtn = document.getElementById("submitBtn");

const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

const countryData = {
IN: { code: "+91", length: 10 },
US: { code: "+1", length: 10 },
UK: { code: "+44", length: [10,11] }
};

// Country change
country.addEventListener("change", function () {
if (countryData[this.value]) {
document.getElementById("countryCode").value = countryData[this.value].code;
}
phone.value = "";
});

// Phone restriction
phone.addEventListener("input", function () {
this.value = this.value.replace(/\D/g, "");

let c = country.value;
if (countryData[c]) {
let maxLen = Array.isArray(countryData[c].length)
? Math.max(...countryData[c].length)
: countryData[c].length;

this.value = this.value.slice(0, maxLen);
}
});

// Validation
function validateName() {
if (!firstName.value.trim()) {
firstNameError.innerText = "Required";
return false;
}
firstNameError.innerText = "";
return true;
}

function validateEmail() {
if (!emailPattern.test(email.value)) {
emailError.innerText = "Invalid Email";
return false;
}
emailError.innerText = "";
return true;
}

function validatePhone() {
if (!country.value) {
phoneError.innerText = "Select country";
return false;
}

let rule = countryData[country.value];

if (Array.isArray(rule.length)) {
if (!rule.length.includes(phone.value.length)) {
phoneError.innerText = "Invalid number length";
return false;
}
} else {
if (phone.value.length !== rule.length) {
phoneError.innerText = "Invalid number length";
return false;
}
}

phoneError.innerText = "";
return true;
}

// Show OTP section
function showOTP() {
if (validateName() && validateEmail() && validatePhone()) {
otpSection.classList.remove("hidden");
} else {
alert("Please fix errors first");
}
}

// Verify OTP
function verifyOTP() {
const otp = document.getElementById("otpInput").value;

if (otp === "222222") {
document.getElementById("otpError").innerText = "";
document.getElementById("otpSuccess").innerText = "OTP Verified Successfully ✅";
submitBtn.classList.remove("hidden");
} else {
document.getElementById("otpError").innerText = "Invalid OTP";
}
}

// Submit
document.getElementById("applicationForm").addEventListener("submit", function(e) {
e.preventDefault();
alert("🎉 Application Submitted Successfully!");
this.reset();
submitBtn.classList.add("hidden");
otpSection.classList.add("hidden");
});

</script>

</body>
</html>
