<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#f4f6f9;
}

/* LEFT */
.left{
flex:1;
background:linear-gradient(135deg,#3b82f6,#1e3a8a);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
}

.left h1{font-size:42px;}
.left li{margin:10px 0;}

/* RIGHT */
.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:340px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* STEPS */
.steps{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.step{
width:30px;height:30px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
}

.active{
background:#2563eb;
color:white;
}

/* OTP */
.otp{
display:flex;
justify-content:center;
gap:8px;
margin:20px 0;
}

.otp input{
width:42px;
height:42px;
text-align:center;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

/* ERROR */
.error{
color:red;
font-size:12px;
text-align:center;
margin-bottom:10px;
display:none;
}

button{
width:100%;
padding:12px;
background:#ff5a3c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
opacity:0.6;
}

button.enabled{
opacity:1;
}
</style>
</head>

<body>

<div class="left">
<h1>Register for Exams Easily</h1>
<ul>
<li>✔ Instant OTP</li>
<li>✔ 100+ Colleges</li>
<li>✔ Fast Process</li>
</ul>
</div>

<div class="right">
<div class="card">

<div class="steps">
<div class="step">1</div>
<div class="step active">2</div>
<div class="step">3</div>
</div>

<h3 style="text-align:center;">Enter OTP</h3>

<div class="otp" id="otpBox">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<div id="errOtp" class="error">Incorrect OTP</div>

<button id="verifyBtn" onclick="verifyOTP()" disabled>Verify OTP</button>

</div>
</div>

<script>

let generatedOTP="123456"; // simulate backend OTP

let inputs=document.querySelectorAll("#otpBox input");
let btn=document.getElementById("verifyBtn");

/* RESET VALUES PROPERLY */
inputs.forEach((input,i)=>{
input.value="";

input.addEventListener("input",()=>{
input.value=input.value.replace(/[^0-9]/g,'');

/* AUTO NEXT */
if(input.value && i<5){
inputs[i+1].focus();
}

checkEnable();
});

/* BACKSPACE */
input.addEventListener("keydown",(e)=>{
if(e.key==="Backspace" && !input.value && i>0){
inputs[i-1].focus();
}
});

});

/* ENABLE BUTTON ONLY WHEN FULL */
function checkEnable(){
let val=[...inputs].map(i=>i.value).join("");
if(val.length===6){
btn.disabled=false;
btn.classList.add("enabled");
}else{
btn.disabled=true;
btn.classList.remove("enabled");
}
}

/* VERIFY */
function verifyOTP(){

let entered=[...inputs].map(i=>i.value).join("");

if(entered!==generatedOTP){
showError("Incorrect OTP");

/* CLEAR INPUTS */
inputs.forEach(i=>i.value="");
inputs[0].focus();
checkEnable();

return;
}

/* SUCCESS */
hideError();
alert("OTP Verified Successfully!");

}

/* ERROR HANDLING */
function showError(msg){
let el=document.getElementById("errOtp");
el.innerText=msg;
el.style.display="block";
}

function hideError(){
document.getElementById("errOtp").style.display="none";
}

</script>

</body>
</html>
