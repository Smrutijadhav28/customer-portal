<!DOCTYPE html>
<html>
<head>
    <title>College Application Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
        }
        .container {
            width: 800px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        h3 {
            margin-top: 25px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row div {
            flex: 1;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
        }
        .btn-updated {
            background: #28a745;
        }
        #status {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>College Application Form</h2>

<!-- Student Info -->
<h3>Student Information</h3>

<div class="row">
    <div>
        <label>First Name *</label>
        <input type="text" id="firstName">
    </div>
    <div>
        <label>Last Name *</label>
        <input type="text" id="lastName">
    </div>
</div>

<label>Email *</label>
<input type="email" name="emailField">

<label>Phone Number *</label>
<input type="text" id="phone">

<!-- Address -->
<h3>Address Details</h3>

<label>Street Address</label>
<input type="text" id="address">

<div class="row">
    <div>
        <label>City</label>
        <input type="text" id="city">
    </div>
    <div>
        <label>State</label>
        <input type="text" id="state">
    </div>
</div>

<label>Zip Code</label>
<input type="text" id="zip">

<!-- Application Info -->
<h3>Application Details</h3>

<label>Application Type *</label>
<select id="appType">
    <option value="">Select</option>
    <option>Freshman</option>
    <option>Transfer</option>
</select>

<label>Course Applied For *</label>
<select id="course">
    <option value="">Select</option>
    <option>Computer Science</option>
    <option>Business</option>
    <option>Engineering</option>
</select>

<label>Semester</label>
<select id="semester">
    <option>Fall</option>
    <option>Spring</option>
</select>

<!-- Education -->
<h3>Education Background</h3>

<label>School Name</label>
<input type="text" id="school">

<label>Year Graduated</label>
<input type="text" id="gradYear">

<label>GPA (0 - 4)</label>
<input type="text" id="gpa">

<!-- Additional -->
<h3>Additional Information</h3>

<label>Achievements</label>
<textarea id="achievements"></textarea>

<label>Extra Activities</label>
<textarea id="activities"></textarea>

<!-- Submit -->
<button id="submitBtn" class="btn-primary">Submit Application</button>

<p id="status"></p>

</div>

<script>

// 🔥 Helper for self-healing field access
function getField(oldId, newId, isName = false) {
    if (isName) {
        return document.getElementsByName(oldId)[0] || document.getElementsByName(newId)[0];
    }
    return document.getElementById(oldId) || document.getElementById(newId);
}

// Validation helpers
function isEmailValid(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function isPhoneValid(phone) {
    return /^[0-9]{10}$/.test(phone);
}

function isGPAValid(gpa) {
    return !isNaN(gpa) && gpa >= 0 && gpa <= 4;
}

// Submit validation
document.getElementById("submitBtn").onclick = function () {

    let errors = [];

    let firstName = getField("firstName", "first_name_v2")?.value;
    let lastName = getField("lastName", "last_name_v2")?.value;
    let email = getField("emailField", "email_new", true)?.value;
    let phone = getField("phone", "phone_v2")?.value;
    let course = getField("course", "course_v2")?.value;
    let appType = getField("appType", "application_type_v2")?.value;
    let gpa = getField("gpa", "gpa_v2")?.value;

    // Mandatory validations
    if (!firstName) errors.push("First Name is required");
    if (!lastName) errors.push("Last Name is required");
    if (!email) errors.push("Email is required");
    if (!phone) errors.push("Phone Number is required");
    if (!course) errors.push("Course is required");
    if (!appType) errors.push("Application Type is required");

    // Format validations
    if (email && !isEmailValid(email)) errors.push("Invalid Email format");
    if (phone && !isPhoneValid(phone)) errors.push("Phone must be 10 digits");
    if (gpa && !isGPAValid(gpa)) errors.push("GPA must be between 0 and 4");

    let status = document.getElementById("status");

    if (errors.length > 0) {
        status.style.color = "red";
        status.innerHTML = errors.join("<br>");
        return;
    }

    status.style.color = "green";
    status.innerText = "Application Submitted Successfully!";
};

// 🔥 Simulate real UI change
setTimeout(() => {

    console.log("UI Update Released...");

    document.getElementById("firstName").id = "first_name_v2";
    document.getElementById("lastName").id = "last_name_v2";
    document.getElementsByName("emailField")[0].name = "email_new";
    document.getElementById("phone").id = "phone_v2";
    document.getElementById("course").id = "course_v2";
    document.getElementById("appType").id = "application_type_v2";
    document.getElementById("gpa").id = "gpa_v2";

    let btn = document.getElementById("submitBtn");
    btn.id = "submit_application_v2";
    btn.className = "btn-primary btn-updated";
    btn.innerText = "Proceed";

    document.getElementById("status").innerText = "UI Updated (New Version Deployed)";

}, 8000);

</script>

</body>
</html>
