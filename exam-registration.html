<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f6;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#fff;
border-bottom:1px solid #ddd;
font-weight:600;
}

/* LAYOUT */
.container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
gap:100px;
}

/* LEFT */
.left{text-align:center;}
.left img{width:250px;}

/* CARD */
.card{
width:380px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* STEPPER */
.stepper{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}
.step{
width:35px;height:35px;
border-radius:50%;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
}
.active{background:#1f5ea8;color:white;}

/* INPUT */
.input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* PHONE */
.phone{
display:flex;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
}
.phone select{
border:none;
padding:10px;
background:#f5f5f5;
}
.phone input{
border:none;
padding:10px;
flex:1;
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
margin-top:15px;
background:#1f5ea8;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* OTP */
.otp{display:flex;gap:10px;}
.otp input{
width:45px;height:50px;
text-align:center;
font-size:18px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
}

/* SUCCESS SCREEN */
.success-screen{
text-align:center;
display:none;
}
.summary{
text-align:left;
background:#f5f5f5;
padding:15px;
border-radius:8px;
margin-top:10px;
}

/* LOADER */
.loader{
display:none;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div>Student Portal</div>
<div>A A+ A++</div>
</div>

<div class="container">

<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
<h2>Secure Student Portal</h2>
<p>Register for Exams Seamlessly</p>
</div>

<div class="card">

<!-- STEPPER -->
<div class="stepper">
<div id="s1" class="step active">1</div>
<div id="s2" class="step">2</div>
<div id="s3" class="step">3</div>
</div>

<!-- STEP 1 -->
<div id="step1">
<input id="name" class="input" placeholder="Full Name">
<input id="email" class="input" placeholder="Email">

<div class="phone">
<select id="country">
<option>+91</option>
<option>+1</option>
</select>
<input id="mobile" maxlength="10" placeholder="Mobile Number">
</div>

<button class="btn" onclick="goStep2()">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<h4>Enter OTP</h4>

<div class="otp">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
<h4>Exam Registration</h4>

<select id="course" class="input">
<option value="">Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
</select>

<input type="date" id="date" class="input">

<select id="city" class="input">
<option value="">Select City</option>
<option>Mumbai</option>
<option>Delhi</option>
</select>

<input id="college" class="input" placeholder="College Name">

<select id="year" class="input">
<option value="">Select Year</option>
<option>1st Year</option>
<option>Final Year</option>
</select>

<input id="idProof" class="input" placeholder="ID Proof Number">

<button class="btn" onclick="submitApplication()">Submit Application</button>
</div>

<!-- LOADER -->
<div id="loader" class="loader">
<p>Submitting...</p>
</div>

<!-- SUCCESS -->
<div id="success" class="success-screen">
<h3>🎉 Application Submitted</h3>
<div id="summary" class="summary"></div>
<button class="btn" onclick="resetForm()">Start New</button>
</div>

</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>

// TOAST
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

// STEP 1
function goStep2(){
let mobile=document.getElementById("mobile").value;
if(mobile.length!==10){
showToast("Enter valid mobile number");
return;
}
step1.style.display="none";
step2.style.display="block";
s1.classList.remove("active");
s2.classList.add("active");
}

// OTP AUTO FOCUS
document.querySelectorAll(".otp input").forEach((i,idx,arr)=>{
i.addEventListener("input",()=>{
if(i.value && idx<5) arr[idx+1].focus();
});
});

// STEP 2
function verifyOTP(){
showToast("OTP Verified");
setTimeout(()=>{
step2.style.display="none";
step3.style.display="block";
s2.classList.remove("active");
s3.classList.add("active");
},1000);
}

// STEP 3 SUBMIT
function submitApplication(){

let course=courseEl.value;
let date=dateEl.value;
let city=cityEl.value;
let college=collegeEl.value;
let year=yearEl.value;
let id=idProofEl.value;

if(!course||!date||!city||!college||!year||!id){
showToast("Fill all fields");
return;
}

// show loader
step3.style.display="none";
loader.style.display="block";

setTimeout(()=>{
loader.style.display="none";
success.style.display="block";

// summary
summary.innerHTML=`
<b>Name:</b> ${name.value}<br>
<b>Email:</b> ${email.value}<br>
<b>Mobile:</b> ${mobile.value}<br>
<b>Course:</b> ${course}<br>
<b>Date:</b> ${date}<br>
<b>City:</b> ${city}<br>
<b>College:</b> ${college}<br>
<b>Year:</b> ${year}<br>
<b>ID:</b> ${id}
`;

},1500);
}

// RESET
function resetForm(){
location.reload();
}

// refs
let step1=document.getElementById("step1");
let step2=document.getElementById("step2");
let step3=document.getElementById("step3");
let loader=document.getElementById("loader");
let success=document.getElementById("success");
let summary=document.getElementById("summary");

let courseEl=document.getElementById("course");
let dateEl=document.getElementById("date");
let cityEl=document.getElementById("city");
let collegeEl=document.getElementById("college");
let yearEl=document.getElementById("year");
let idProofEl=document.getElementById("idProof");

</script>

</body>
</html>
