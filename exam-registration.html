<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
display:flex;
height:100vh;
background:#f5f7fb;
}

/* LEFT SIDE (Hero) */
.left{
width:55%;
background:linear-gradient(135deg,#1f5ea8,#4a90e2);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
padding:60px;
}

.left h1{
font-size:42px;
margin-bottom:20px;
}

.left p{
opacity:0.9;
margin-bottom:30px;
}

.features{
margin-top:20px;
}

.features div{
margin-bottom:12px;
}

/* RIGHT SIDE (Form) */
.right{
width:45%;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

.card{
width:380px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.progress{
height:6px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.progress div{
width:33%;
height:100%;
background:#1f5ea8;
}

/* Floating Inputs */
.form-group{
position:relative;
margin-bottom:25px;
}

.input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
outline:none;
}

label{
position:absolute;
top:50%;
left:14px;
transform:translateY(-50%);
color:#999;
font-size:14px;
transition:0.3s;
background:white;
padding:0 4px;
}

.input:focus + label,
.input:not(:placeholder-shown) + label{
top:-8px;
font-size:11px;
color:#1f5ea8;
}

/* Phone Row */
.phone-row{
display:flex;
gap:10px;
}

.phone-row select{
width:35%;
padding:14px;
border-radius:8px;
border:1px solid #ccc;
}

.phone-row input{
width:65%;
}

/* Button */
.btn{
width:100%;
padding:14px;
background:#ff5a3c;
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#e94b2f;
}

/* Small text */
.secure{
font-size:12px;
color:#777;
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
<h1>Register for Exams Easily</h1>
<p>Secure • Fast • Trusted by 1L+ Students</p>

<div class="features">
<div>✔ Instant OTP Verification</div>
<div>✔ 100+ Colleges Supported</div>
<div>✔ Quick Application Process</div>
</div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
<div class="card">

<div class="progress"><div></div></div>

<h3 style="margin-bottom:20px;">Get Started</h3>

<!-- NAME -->
<div class="form-group">
<input type="text" class="input" placeholder=" " id="name">
<label>Full Name</label>
</div>

<!-- EMAIL -->
<div class="form-group">
<input type="email" class="input" placeholder=" " id="email">
<label>Email Address</label>
</div>

<!-- PHONE -->
<div class="form-group phone-row">
<select id="country">
<option>🇮🇳 +91</option>
<option>🇺🇸 +1</option>
<option>🇬🇧 +44</option>
</select>

<input type="tel" class="input" placeholder="Mobile Number" id="mobile">
</div>

<button class="btn" onclick="nextStep()">Continue →</button>

<div class="secure">🔒 Your data is safe & encrypted</div>

</div>
</div>

<script>
function nextStep(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let mobile = document.getElementById("mobile").value;

if(!name || !email || !mobile){
alert("Please fill all fields");
return;
}

// simulate next
alert("Proceeding to OTP Screen...");
}
</script>

</body>
</html>
