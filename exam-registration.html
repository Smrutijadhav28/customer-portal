<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>

body {
    margin:0;
    font-family:Segoe UI;
    background:#f4f6f9;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:white;
    border-bottom:1px solid #ddd;
}
.logo { color:#e60023; font-weight:bold; }

/* LAYOUT */
.container {
    display:flex;
    height:calc(100vh - 60px);
}

/* LEFT */
.left {
    width:55%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#eef2f7;
}

/* RIGHT */
.right {
    width:45%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card {
    width:420px;
    padding:30px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 25px rgba(0,0,0,0.1);
}

/* INPUT */
.input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
.btn {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0b5cab;
    color:white;
    border:none;
    border-radius:6px;
}

/* ERROR */
.error { color:red; font-size:12px; }

/* STEPS */
.step { display:none; }
.active { display:block; }

/* PHONE FIX */
.iti { width:100%; }
.iti input { width:100%; padding-left:55px !important; height:45px; }

/* SUCCESS */
.success {
    color:green;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">kotak</div>
    <div>A A+ A++</div>
</div>

<div class="container">

<div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="300">
    <h3>Secure Student Portal</h3>
</div>

<div class="right">

<div class="card">

<h2>Student Registration</h2>

<!-- STEP 1 -->
<div id="step1" class="step active">

<input id="name" class="input" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input id="email" class="input" placeholder="Email">
<div id="emailError" class="error"></div>

<input id="phone" type="tel" class="input" placeholder="Phone Number">
<div id="phoneError" class="error"></div>

<button class="btn" onclick="goToOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<input id="otp" class="input" placeholder="Enter OTP (222222)">
<div id="otpError" class="error"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

<div id="otpSuccess" class="success"></div>

</div>

<!-- STEP 3 (REAL FORM) -->
<div id="step3" class="step">

<h3>Exam Registration</h3>

<select class="input" id="course">
<option value="">Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
<option>BCA</option>
</select>

<input type="date" class="input" id="examDate">

<select class="input" id="center">
<option value="">Select Exam Center</option>
<option>Mumbai</option>
<option>Pune</option>
<optionDelhi</option>
</select>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

const iti = window.intlTelInput(document.querySelector("#phone"), {
initialCountry:"in",
separateDialCode:true
});

const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

function goToOTP(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let valid=true;

if(!name){document.getElementById("nameError").innerText="Required"; valid=false;}
else document.getElementById("nameError").innerText="";

if(!emailPattern.test(email)){document.getElementById("emailError").innerText="Invalid Email"; valid=false;}
else document.getElementById("emailError").innerText="";

if(phone.length<8){document.getElementById("phoneError").innerText="Invalid Phone"; valid=false;}
else document.getElementById("phoneError").innerText="";

if(valid){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}

}

function verifyOTP(){

if(document.getElementById("otp").value==="222222"){

document.getElementById("otpSuccess").innerText="OTP Verified Successfully";

setTimeout(()=>{
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
},1000);

}else{
document.getElementById("otpError").innerText="Invalid OTP";
}

}

function submitForm(){
alert("Application Submitted Successfully!");
}

</script>

</body>
</html>
