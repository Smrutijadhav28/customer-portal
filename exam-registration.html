<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"/>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#f4f6f9;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
}
.logo{
font-weight:600;
}

/* LAYOUT */
.container{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT */
.left{
width:55%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#eef2f7;
}

/* RIGHT */
.right{
width:45%;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:420px;
padding:30px;
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* STEPPER */
.stepper{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}
.step-indicator{
width:32px;
height:32px;
border-radius:50%;
background:#ccc;
text-align:center;
line-height:32px;
}
.active-step{
background:#0b5cab;
color:white;
}

/* INPUT */
.input{
width:100%;
height:45px;
padding:10px;
margin-top:12px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

/* BUTTON */
.btn{
width:100%;
height:45px;
margin-top:18px;
background:#0b5cab;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* OTP */
.otp-container{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}
.otp-box{
width:45px;
height:50px;
text-align:center;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
}

/* STATES */
.error{color:red;font-size:12px;}
.success{color:green;margin-top:10px;}

/* STEPS */
.step{display:none;}
.active{display:block;}

/* PHONE FIX */
.iti{width:100%;}
.iti input{
width:100%;
height:45px;
padding-left:55px !important;
}

/* MOBILE */
@media(max-width:768px){
.container{flex-direction:column;}
.left{display:none;}
.right{width:100%;}
}

</style>
</head>

<body>

<div class="header">
<div class="logo">Student Portal</div>
<div>A A+ A++</div>
</div>

<div class="container">

<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="300">
<h3>Secure Student Portal</h3>
<p>Register for Exams Seamlessly</p>
</div>

<div class="right">

<div class="card">

<div class="stepper">
<div id="s1" class="step-indicator active-step">1</div>
<div id="s2" class="step-indicator">2</div>
<div id="s3" class="step-indicator">3</div>
</div>

<!-- STEP 1 -->
<div id="step1" class="step active">

<input id="name" class="input" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input id="email" class="input" placeholder="Email">
<div id="emailError" class="error"></div>

<input id="phone" type="tel" class="input" placeholder="Phone Number">
<div id="phoneError" class="error"></div>

<button class="btn" onclick="goToOTP()">Continue</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="step">

<p style="text-align:center;">Enter OTP</p>

<div class="otp-container">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
</div>

<div id="otpError" class="error"></div>
<div id="otpSuccess" class="success"></div>

<button class="btn" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- STEP 3 -->
<div id="step3" class="step">

<h3>Exam Registration</h3>

<select class="input">
<option>Select Course</option>
<option>B.Tech</option>
<option>MBA</option>
<option>BCA</option>
</select>

<input type="date" class="input">

<select class="input">
<option>Select Center</option>
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
</select>

<button class="btn" onclick="submitForm()">Submit Application</button>

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

<script>

/* PHONE INIT */
const phoneInput = document.querySelector("#phone");
const iti = window.intlTelInput(phoneInput, {
initialCountry:"in",
separateDialCode:true
});

/* LIMIT TO 10 DIGITS */
phoneInput.addEventListener("input", function(){
this.value = this.value.replace(/\D/g,'').slice(0,10);
});

/* VALIDATION */
const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

function goToOTP(){

let valid=true;

if(!name.value){
nameError.innerText="Required";
valid=false;
}else nameError.innerText="";

if(!emailPattern.test(email.value)){
emailError.innerText="Invalid Email";
valid=false;
}else emailError.innerText="";

if(phoneInput.value.length!==10){
phoneError.innerText="Enter 10 digit number";
valid=false;
}else phoneError.innerText="";

if(valid){
switchStep(1,2);
}

}

/* OTP LOGIC */
const otpInputs=document.querySelectorAll(".otp-box");

otpInputs.forEach((input,i)=>{
input.addEventListener("input",()=>{
if(input.value && i<5) otpInputs[i+1].focus();
});
input.addEventListener("keydown",(e)=>{
if(e.key==="Backspace" && !input.value && i>0){
otpInputs[i-1].focus();
}
});
});

function verifyOTP(){

let otp="";
otpInputs.forEach(i=>otp+=i.value);

if(otp==="222222"){
otpSuccess.innerText="OTP Verified Successfully";
setTimeout(()=>switchStep(2,3),800);
}else{
otpError.innerText="Invalid OTP";
}

}

/* STEP SWITCH */
function switchStep(from,to){
document.getElementById("step"+from).classList.remove("active");
document.getElementById("step"+to).classList.add("active");

document.getElementById("s"+from).classList.remove("active-step");
document.getElementById("s"+to).classList.add("active-step");
}

/* SUBMIT */
function submitForm(){
alert("Application Submitted Successfully!");
}

</script>

</body>
</html>
