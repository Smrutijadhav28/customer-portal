<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemoBank Enterprise Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#eef2f7;
  color:#0f172a;
}

.header{
  height:72px;
  background:#071b3a;
  color:white;
  display:flex;
  align-items:center;
  padding:0 24px;
}

.logo{
  font-size:20px;
  font-weight:700;
}

.layout{
  display:flex;
  min-height:calc(100vh - 72px);
}

.sidebar{
  width:260px;
  background:#122b57;
  padding:24px 18px;
}

.sidebar button{
  width:100%;
  margin-bottom:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:transparent;
  color:white;
  text-align:left;
  cursor:pointer;
  font-size:15px;
}

.sidebar button:hover{
  background:#254884;
}

.main{
  flex:1;
  padding:28px;
}

.card{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 30px rgba(15,23,42,0.08);
  margin-bottom:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

.statCard{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  border-radius:18px;
  padding:22px;
}

.statCard h3{
  font-size:14px;
  margin-bottom:8px;
}

.statCard p{
  font-size:28px;
  font-weight:700;
}

input,select{
  width:100%;
  padding:14px;
  border:1px solid #cbd5e1;
  border-radius:12px;
  margin-bottom:16px;
  font-size:15px;
}

button.primary{
  background:#2563eb;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

button.secondary{
  background:#e2e8f0;
  color:#0f172a;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

button.success{
  background:#16a34a;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#dc2626;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  display:none;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#dcfce7;
  color:#166534;
  font-size:12px;
  font-weight:600;
}

.tableRow{
  padding:18px;
  border:1px solid #e2e8f0;
  border-radius:16px;
  margin-bottom:14px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f172a;
  color:white;
  padding:14px 18px;
  border-radius:12px;
  z-index:999;
}

.loginWrap{
  min-height:calc(100vh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.loginCard{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:24px;
  padding:34px;
  box-shadow:0 20px 50px rgba(15,23,42,0.12);
}

.steps{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.step{
  padding:10px 14px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
  font-size:13px;
  font-weight:700;
}

.reviewBox{
  background:#f8fafc;
  border:1px solid #dbeafe;
  border-radius:16px;
  padding:18px;
  margin:18px 0;
}

.reviewBox p{
  margin-bottom:10px;
}

@media(max-width:900px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    overflow:auto;
    gap:10px;
  }

  .sidebar button{
    min-width:170px;
    margin-bottom:0;
  }

  .main{
    padding:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DemoBank Enterprise Portal</div>
</div>

<div id="app"></div>

<script>

let currentUser = null;
let transferDraft = {};
let transferOtpAttempts = 3;
let otpExpiry = null;

function seedData(){

  if(localStorage.getItem("demoBankData")) return;

  const data = {
    balance:445850,
    openingBalance:400000,
    dailyTransferred:0,

    profile:{
      name:"Smruti Jadhav",
      customerId:"CUST1001",
      account:"XXXX5421",
      branch:"Mumbai Main Branch",
      ifsc:"DEMO0001234",
      mobile:"9876543210"
    },

    beneficiaries:[
      {
        name:"Sachin Patil",
        bank:"Kotak Mahindra Bank",
        account:"XXXX4704",
        activeAt:Date.now()-1000
      }
    ],

    transactions:[]
  };

  localStorage.setItem(
    "demoBankData",
    JSON.stringify(data)
  );
}

seedData();

function getData(){
  return JSON.parse(
    localStorage.getItem("demoBankData")
  );
}

function saveData(data){
  localStorage.setItem(
    "demoBankData",
    JSON.stringify(data)
  );
}

function fmt(n){
  return "INR " + Number(n).toLocaleString("en-IN");
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;

  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },2500);
}
  function renderLogin(){

  document.getElementById("app").innerHTML = `
    <div class="loginWrap">
      <div class="loginCard">

        <h2 style="margin-bottom:12px;">Secure Login</h2>

        <p style="margin-bottom:24px;color:#475569;">
          Customer: CUST1001 / Demo@123
          <br>
          Admin: ADMIN01 / Admin@123
        </p>

        <input
          id="loginId"
          placeholder="User ID"
        >

        <input
          id="loginPwd"
          type="password"
          placeholder="Password"
        >

        <button
          class="primary"
          onclick="login()"
        >
          Login
        </button>

        <div id="loginErr" class="error">
          Invalid credentials
        </div>

      </div>
    </div>
  `;
}

function login(){

  const user =
    document.getElementById("loginId").value.trim();

  const pass =
    document.getElementById("loginPwd").value.trim();

  const err =
    document.getElementById("loginErr");

  err.style.display = "none";

  if(user === "CUST1001" && pass === "Demo@123"){
    currentUser = "customer";
    loadApp();
    toast("Customer login successful");
    return;
  }

  if(user === "ADMIN01" && pass === "Admin@123"){
    currentUser = "admin";
    loadApp();
    toast("Admin login successful");
    return;
  }

  err.style.display = "block";
}

function logout(){
  currentUser = null;
  renderLogin();
}

function loadApp(){

  document.getElementById("app").innerHTML = `
    <div class="layout">

      <div class="sidebar">

        <button onclick="renderDashboard()">
          Dashboard
        </button>

        <button onclick="renderBeneficiaries()">
          Beneficiaries
        </button>

        <button onclick="renderTransfer()">
          Transfer
        </button>

        <button onclick="renderTransactions()">
          Transactions
        </button>

        <button onclick="renderCards()">
          Cards
        </button>

        <button onclick="renderLoans()">
          Loans
        </button>

        <button onclick="renderServices()">
          Services
        </button>

        <button onclick="renderProfile()">
          Profile
        </button>

        ${
          currentUser === "admin"
          ?
          `
          <button onclick="renderAdminDashboard()">
            Admin
          </button>
          `
          :
          ""
        }

        <button onclick="logout()">
          Logout
        </button>

      </div>

      <div class="main" id="mainContent"></div>

    </div>
  `;

  renderDashboard();
}

/* DASHBOARD */
function renderDashboard(){

  const d = getData();
  const p = d.profile;

  document.getElementById("mainContent").innerHTML = `
    <div class="grid">

      <div class="statCard">
        <h3>Savings Balance</h3>
        <p>${fmt(d.balance)}</p>
      </div>

      <div class="statCard">
        <h3>Opening Balance</h3>
        <p>${fmt(d.openingBalance)}</p>
      </div>

      <div class="statCard">
        <h3>Daily Transfer Used</h3>
        <p>${fmt(d.dailyTransferred)}</p>
      </div>

    </div>

    <div class="card">
      <h2>Welcome, ${p.name}</h2>

      <p>
        Customer ID: ${p.customerId}
        <br><br>
        Account: ${p.account}
        <br><br>
        Branch: ${p.branch}
        <br><br>
        IFSC: ${p.ifsc}
      </p>
    </div>
  `;
}

/* BENEFICIARIES */
let beneficiaryDraft = null;
let beneficiaryOtpAttempts = 3;
let beneficiaryOtpExpiry = null;

/* MAIN SCREEN */
function renderBeneficiaries(){

  const d = getData();

  let cards = "";

  d.beneficiaries.forEach((b)=>{

    const active =
      Date.now() >= b.activeAt;

    const badge =
      active
      ? `<span class="badge">Active</span>`
      : `<span style="color:#dc2626;font-weight:600;">
          Pending Activation
        </span>`;

    const activateTime =
      !active
      ? `
        <div style="margin-top:8px;color:#64748b;">
          Available after:
          ${new Date(b.activeAt).toLocaleString()}
        </div>
      `
      : "";

    cards += `
      <div class="tableRow">

        <strong style="font-size:18px;">
          ${b.name}
        </strong>

        <br><br>

        Bank:
        ${b.bank}

        <br>

        A/c:
        ${b.account}

        <br>

        IFSC:
        ${b.ifsc}

        <br>

        Nickname:
        ${b.nickname || "-"}

        <br><br>

        ${badge}

        ${activateTime}

        <br><br>

        ${
  active
  ?
  `
  <div style="display:flex;gap:10px;flex-wrap:wrap;">

    <button
      class="primary"
      onclick="renderTransferWithBeneficiary('${b.account}')"
    >
      Transfer Now
    </button>

    <button
      class="secondary"
      onclick="deleteBeneficiary('${b.account}', true)"
    >
      Delete
    </button>

  </div>
  `
  :
  `
  <button
    class="secondary"
    onclick="deleteBeneficiary('${b.account}', false)"
  >
    Remove Pending Beneficiary
  </button>
  `
}

      </div>
    `;
  });

  document.getElementById("mainContent").innerHTML = `
    <div class="card">

      <h2>Add Beneficiary</h2>

      <div id="beneficiaryWizard">

        <div class="steps">
          <div class="step">1 Details</div>
          <div class="step">2 Validate</div>
          <div class="step">3 OTP</div>
          <div class="step">4 Confirm</div>
        </div>

        <input
          id="benName"
          placeholder="Beneficiary Full Name"
        >

        <input
          id="benBank"
          placeholder="Bank Name"
        >

        <input
          id="benAccount"
          placeholder="Account Number"
        >

        <input
          id="benAccount2"
          placeholder="Re-enter Account Number"
        >

        <input
          id="benIfsc"
          placeholder="IFSC Code"
        >

        <input
          id="benNickname"
          placeholder="Nickname (optional)"
        >

        <button
          class="primary"
          onclick="validateBeneficiaryStep1()"
        >
          Validate Beneficiary
        </button>

      </div>

      <div id="benErr" class="error"></div>

    </div>

    <div class="card">
      <h2>Existing Beneficiaries</h2>
      ${cards || "<p>No beneficiaries added.</p>"}
    </div>
  `;
}

/* STEP 1 VALIDATION */
function validateBeneficiaryStep1(){

  const err =
    document.getElementById("benErr");

  err.style.display = "none";

  const name =
    benName.value.trim();

  const bank =
    benBank.value.trim();

  const acct =
    benAccount.value.trim();

  const acct2 =
    benAccount2.value.trim();

  const ifsc =
    benIfsc.value.trim().toUpperCase();

  const nickname =
    benNickname.value.trim();

  if(!name || !bank || !acct || !acct2 || !ifsc){
    showBeneficiaryError("All mandatory fields are required.");
    return;
  }

  if(acct.length < 8){
    showBeneficiaryError("Account number looks invalid.");
    return;
  }

  if(acct !== acct2){
    showBeneficiaryError("Account numbers do not match.");
    return;
  }

  if(!/^[A-Z]{4}0[A-Z0-9]{6}$/.test(ifsc)){
    showBeneficiaryError("Invalid IFSC code format.");
    return;
  }

  beneficiaryDraft = {
    name,
    bank,
    account:"XXXX" + acct.slice(-4),
    fullAccount:acct,
    ifsc,
    nickname
  };

  simulateBeneficiaryValidation();
}

/* STEP 2 VALIDATION SIMULATION */
function simulateBeneficiaryValidation(){

  const wizard =
    document.getElementById("beneficiaryWizard");

  wizard.innerHTML = `
    <div style="
      padding:40px;
      text-align:center;
    ">
      <h3>Validating beneficiary...</h3>

      <p style="color:#64748b;">
        Verifying account details with bank network
      </p>

      <div style="
        width:40px;
        height:40px;
        border:4px solid #cbd5e1;
        border-top:4px solid #2563eb;
        border-radius:50%;
        margin:20px auto;
        animation:spin 1s linear infinite;
      "></div>
    </div>
  `;

  setTimeout(()=>{

    wizard.innerHTML = `
      <div class="reviewBox">

        <h3>Beneficiary Validated</h3>

        <p>
          Account Holder:
          ${beneficiaryDraft.name}
        </p>

        <p>
          Bank:
          ${beneficiaryDraft.bank}
        </p>

        <p>
          IFSC:
          ${beneficiaryDraft.ifsc}
        </p>

        <br>

        <button
          class="primary"
          onclick="startBeneficiaryOtpFlow()"
        >
          Continue with OTP Verification
        </button>

      </div>
    `;

  }, 2000);
}
  let deleteBeneficiaryDraft = null;
let deleteBeneficiaryOtpExpiry = null;
let deleteBeneficiaryAttempts = 3;

function deleteBeneficiary(accountMask, requiresOtp){

  const d = getData();

  const ben =
    d.beneficiaries.find(
      x => x.account === accountMask
    );

  if(!ben){
    alert("Beneficiary not found");
    return;
  }

  if(!requiresOtp){

    d.beneficiaries =
      d.beneficiaries.filter(
        x => x.account !== accountMask
      );

    saveData(d);

    toast("Pending beneficiary removed");

    renderBeneficiaries();

    return;
  }

  deleteBeneficiaryDraft = ben;
  deleteBeneficiaryAttempts = 3;
  deleteBeneficiaryOtpExpiry = Date.now() + 60000;

  showDeleteBeneficiaryOtpModal();

  toast("Delete OTP: 123456");
}
function showDeleteBeneficiaryOtpModal(){

  const existing =
    document.getElementById("deleteBeneficiaryModal");

  if(existing){
    existing.remove();
  }

  const modal = document.createElement("div");

  modal.id = "deleteBeneficiaryModal";

  modal.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99999;
  `;

  modal.innerHTML = `
    <div style="
      width:440px;
      max-width:92%;
      background:white;
      border-radius:18px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
    ">

      <h2 style="margin-bottom:12px;">
        Delete Beneficiary
      </h2>

      <p style="margin-bottom:10px;">
        ${deleteBeneficiaryDraft.name}
      </p>

      <p style="margin-bottom:10px;">
        ${deleteBeneficiaryDraft.bank}
      </p>

      <p style="margin-bottom:18px;">
        ${deleteBeneficiaryDraft.account}
      </p>

      <p style="
        color:#64748b;
        margin-bottom:18px;
      ">
        OTP sent to registered mobile XXXXX3210
      </p>

      <input
        id="deleteBeneficiaryOtp"
        maxlength="6"
        placeholder="Enter OTP"
      >

      <div style="
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      ">

        <button
          class="primary"
          onclick="verifyDeleteBeneficiaryOtp()"
        >
          Verify & Delete
        </button>

        <button
          class="secondary"
          onclick="resendDeleteBeneficiaryOtp()"
        >
          Resend OTP
        </button>

        <button
          class="secondary"
          onclick="closeDeleteBeneficiaryModal()"
        >
          Cancel
        </button>

      </div>

      <div
        id="deleteBeneficiaryErr"
        style="
          display:none;
          color:#dc2626;
          margin-top:16px;
          font-weight:600;
        "
      ></div>

      <div
        id="deleteBeneficiaryTimer"
        style="
          margin-top:14px;
          color:#64748b;
        "
      >
        OTP valid for 60 seconds
      </div>

    </div>
  `;

  document.body.appendChild(modal);

  startDeleteBeneficiaryTimer();
}
  function closeDeleteBeneficiaryModal(){

  const modal =
    document.getElementById("deleteBeneficiaryModal");

  if(modal){
    modal.remove();
  }
}
  function resendDeleteBeneficiaryOtp(){

  deleteBeneficiaryAttempts = 3;
  deleteBeneficiaryOtpExpiry = Date.now() + 60000;

  toast("Delete OTP resent: 123456");

  startDeleteBeneficiaryTimer();
}
function showBeneficiaryError(msg){

  const err =
    document.getElementById("benErr");

  err.innerText = msg;
  err.style.display = "block";
}
  /* =========================
   BENEFICIARY WIZARD PATCH B2
========================= */

/* STEP 3 OTP FLOW */
function startBeneficiaryOtpFlow(){

  beneficiaryOtpAttempts = 3;
  beneficiaryOtpExpiry = Date.now() + 60000;

  showBeneficiaryOtpModal();

  toast("Demo OTP: 654321");
}

function showBeneficiaryOtpModal(){

  const existing =
    document.getElementById("beneficiaryOtpModal");

  if(existing){
    existing.remove();
  }

  const modal = document.createElement("div");

  modal.id = "beneficiaryOtpModal";

  modal.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99999;
  `;

  modal.innerHTML = `
    <div style="
      width:420px;
      max-width:92%;
      background:#fff;
      border-radius:16px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    ">

      <h2 style="
        margin-bottom:12px;
        color:#0f172a;
      ">
        OTP Verification
      </h2>

      <p style="
        color:#64748b;
        margin-bottom:20px;
      ">
        OTP sent to registered mobile XXXXX3210
      </p>

      <input
        id="beneficiaryOtpInput"
        maxlength="6"
        placeholder="Enter 6-digit OTP"
        style="
          width:100%;
          padding:14px;
          border:1px solid #cbd5e1;
          border-radius:12px;
          font-size:16px;
          margin-bottom:18px;
        "
      >

      <div style="
        display:flex;
        gap:10px;
      ">
        <button
          class="primary"
          onclick="verifyBeneficiaryOtp()"
        >
          Verify OTP
        </button>

        <button
          class="secondary"
          onclick="resendBeneficiaryOtp()"
        >
          Resend OTP
        </button>

        <button
          class="secondary"
          onclick="closeBeneficiaryOtpModal()"
        >
          Cancel
        </button>
      </div>

      <div
        id="beneficiaryOtpErr"
        style="
          display:none;
          color:#dc2626;
          margin-top:18px;
          font-weight:600;
        "
      ></div>

      <div
        id="beneficiaryOtpTimer"
        style="
          margin-top:14px;
          color:#64748b;
          font-size:14px;
        "
      >
        OTP valid for 60 seconds
      </div>

    </div>
  `;

  document.body.appendChild(modal);

  startBeneficiaryOtpTimer();
}

function closeBeneficiaryOtpModal(){

  const modal =
    document.getElementById("beneficiaryOtpModal");

  if(modal){
    modal.remove();
  }
}

function resendBeneficiaryOtp(){

  beneficiaryOtpAttempts = 3;
  beneficiaryOtpExpiry = Date.now() + 60000;

  toast("Demo OTP resent: 654321");

  startBeneficiaryOtpTimer();
}

function startBeneficiaryOtpTimer(){

  const timer =
    document.getElementById("beneficiaryOtpTimer");

  if(!timer) return;

  const interval = setInterval(()=>{

    if(!document.getElementById("beneficiaryOtpModal")){
      clearInterval(interval);
      return;
    }

    const remaining =
      Math.max(
        0,
        Math.floor(
          (beneficiaryOtpExpiry - Date.now()) / 1000
        )
      );

    timer.innerText =
      "OTP valid for " + remaining + " seconds";

    if(remaining <= 0){
      clearInterval(interval);
    }

  },1000);
}

function verifyBeneficiaryOtp(){

  const err =
    document.getElementById("beneficiaryOtpErr");

  const otp =
    document.getElementById("beneficiaryOtpInput")
      .value
      .trim();

  err.style.display = "none";

  if(Date.now() > beneficiaryOtpExpiry){
    err.innerText = "OTP expired. Please resend OTP.";
    err.style.display = "block";
    return;
  }

  if(otp !== "654321"){

    beneficiaryOtpAttempts--;

    if(beneficiaryOtpAttempts <= 0){
      err.innerText =
        "Maximum OTP attempts exceeded.";
      err.style.display = "block";
      return;
    }

    err.innerText =
      "Invalid OTP. Attempts left: " +
      beneficiaryOtpAttempts;

    err.style.display = "block";
    return;
  }

  saveBeneficiaryAfterOtp();
}

/* STEP 4 SAVE */
function saveBeneficiaryAfterOtp(){

  const d = getData();

  const activationDelay = 30 * 60 * 1000; // 30 mins

  const refId =
    "BEN" + Date.now();

  d.beneficiaries.push({
    name: beneficiaryDraft.name,
    bank: beneficiaryDraft.bank,
    account: beneficiaryDraft.account,
    fullAccount: beneficiaryDraft.fullAccount,
    ifsc: beneficiaryDraft.ifsc,
    nickname: beneficiaryDraft.nickname,
    refId: refId,
    activeAt: Date.now() + activationDelay
  });

  saveData(d);

  closeBeneficiaryOtpModal();

  document.getElementById("beneficiaryWizard").innerHTML = `
    <div class="reviewBox">

function executeAdminTxn(){

  const d = getData();

  const amt = Number(adminTxnAmount.value);
  const reason = adminTxnReason.value.trim();

  const err = document.getElementById("adminErr");

    err.style.display = "block";

    beneficiary:"CUST1001",
    amount:amt,
    type:type,
    utr:"ADM"+Date.now(),
    status:"Success",
    remarks:reason
  });

  saveData(d);

  toast("Admin transaction completed");

  renderAdminDashboard();
}

function validateTransferDetails(){

  const d = getData();

  const benIndex = tfBen.value;
  const type = tfType.value;
  const amountRaw = tfAmount.value.trim();
  const pan = tfPan.value.trim().toUpperCase();

  if(benIndex === ""){
    return "Please select beneficiary.";
  }

  const ben = d.beneficiaries[benIndex];

  if(Date.now() < ben.activeAt){
    return "Beneficiary is not active yet.";
  }

if(!/^\d+(\.\d{1,2})?$/.test(amountRaw)){
    return "Enter valid amount (max 2 decimals).";
  }

  const amount = Number(amountRaw);

  if(amount < 1){
    return "Minimum transfer amount is INR 1.00";
  }

  if(amount > d.balance){
    return "Insufficient balance.";
  }

  if(d.dailyTransferred + amount > 1000000){
    return "Daily transfer limit exceeded.";
  }

  if(amount > 50000){
    if(!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){
      return "Valid PAN required above INR 50,000.";
    }
  }

  if(type === "IMPS" && amount > 500000){
    return "IMPS limit is INR 5,00,000.";
  }

  if(type === "RTGS" && amount < 200000){
    return "RTGS minimum is INR 2,00,000.";
  }

  return "";
}

  errBox.style.display = "none";

function resendTransferOtp(){
  otpExpiry = Date.now() + 60000;
  transferOtpAttempts = 3;
  toast("OTP resent: 123456");
}

function verifyTransferOtp(){

  const errBox = document.getElementById("tfErr");

  if(Date.now() > otpExpiry){
    errBox.innerText = "OTP expired. Resend OTP.";
    errBox.style.display = "block";
    return;
  }

  const otp = transferOtp.value.trim();

  if(otp !== "123456"){

    transferOtpAttempts--;

    errBox.innerText =
      transferOtpAttempts > 0
      ?
      "Incorrect OTP. Attempts left: " +
      transferOtpAttempts
      :
      "OTP locked.";

    errBox.style.display = "block";
    return;
  }

  errBox.style.display = "none";

  showTransferReview();
}

function applyTransactionFilters(){

  const d = getData();

  const fromDate =
    txnFromDate.value;

  const toDate =
    txnToDate.value;

  const type =
    txnType.value;

  const beneficiary =
    txnBeneficiary.value
      .trim()
      .toLowerCase();

  let filtered = d.transactions.filter((t)=>{

    let match = true;

    if(type && t.type !== type){
      match = false;
    }

    if(
      beneficiary &&
      !(t.beneficiary || "")
        .toLowerCase()
        .includes(beneficiary)
    ){
      match = false;
    }

    if(fromDate){
      if(new Date(t.date) < new Date(fromDate)){
        match = false;
      }
    }

    if(toDate){
      const end = new Date(toDate);
      end.setHours(23,59,59);

      if(new Date(t.date) > end){
        match = false;
      }
    }

    return match;
  });

  renderTransactions(filtered);
}
