<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemoBank Enterprise Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef2f7;color:#1e293b}.hidden{display:none}.topbar{background:#0b1f3a;color:#fff;padding:14px 20px;font-size:22px;font-weight:700}.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}.sidebar{background:#132a4d;color:#fff;padding:16px}.menu{padding:12px;border-radius:10px;margin:8px 0;cursor:pointer}.menu.active,.menu:hover{background:#1f4173}.content{padding:20px}.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.accounts{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.acct{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);color:#fff;padding:20px;border-radius:16px}input,select,button,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;margin:8px 0;font-size:15px}button{background:#2563eb;color:#fff;border:none;font-weight:600;cursor:pointer}.secondary{background:#64748b}.danger{background:#dc2626}.success{background:#16a34a}.tableRow{padding:12px;border-bottom:1px solid #e2e8f0}.badge{background:#dcfce7;color:#166534;padding:4px 8px;border-radius:999px;font-size:12px}.toast{position:fixed;top:20px;right:20px;background:#111827;color:#fff;padding:14px 18px;border-radius:10px;display:none;z-index:1000}.error{color:#dc2626;font-size:13px;display:none}.loginWrap{max-width:460px;margin:70px auto}.otpBox{display:flex;gap:10px}.toggle{display:flex;justify-content:space-between;align-items:center;padding:10px 0}.small{font-size:13px;color:#64748b}@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{display:flex;overflow:auto;gap:8px}.menu{white-space:nowrap}}</style>
</head>
<body>
<div class="topbar">DemoBank Enterprise Portal</div>
<div id="toast" class="toast"></div>

<div id="loginPage" class="content">
  <div class="card loginWrap">
    <h2>Secure Login</h2>
    <p>Customer: CUST1001 / Demo@123</p>
    <p>Admin: ADMIN01 / Admin@123</p>
    <input id="loginId" placeholder="User ID">
    <input id="loginPwd" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="loginErr" class="error">Invalid credentials</div>
  </div>
</div>

<div id="app" class="hidden">
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div id="dashboard" class="view"></div>
    <div id="beneficiaries" class="view hidden"></div>
    <div id="transfer" class="view hidden"></div>
    <div id="transactions" class="view hidden"></div>
    <div id="cards" class="view hidden"></div>
    <div id="loans" class="view hidden"></div>
    <div id="services" class="view hidden"></div>
    <div id="profile" class="view hidden"></div>
    <div id="admin" class="view hidden"></div>
  </div>
</div>
</div>
<script>
const USERS={customer:{id:'CUST1001',pwd:'Demo@123',name:'Smruti Jadhav'},admin:{id:'ADMIN01',pwd:'Admin@123',name:'Bank Admin'}};
function initData(){if(!localStorage.getItem('bankEnterprise')){localStorage.setItem('bankEnterprise',JSON.stringify({balance:482450,current:1250000,beneficiaries:[{name:'Amit Sharma',account:'4433221100',ifsc:'HDFC0001234'}],transactions:[],card:{blocked:false,online:true,intl:false,limit:50000},loan:{type:'Home Loan',emi:35600,outstanding:2850000},services:[],profile:{name:'Smruti Jadhav',mobile:'9876543210',email:'smruti@example.com',pan:'ABCDE1234F',aadhaar:'XXXX-XXXX-4567',address:'Mumbai',nominee:'Rahul Jadhav'}}));}}
function data(){initData();return JSON.parse(localStorage.getItem('bankEnterprise'));}
function save(d){localStorage.setItem('bankEnterprise',JSON.stringify(d));}
function toast(msg){const t=toastEl();t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000)}
function toastEl(){return document.getElementById('toast')}
function login(){const id=loginId.value.trim(),pwd=loginPwd.value.trim();if(id===USERS.customer.id&&pwd===USERS.customer.pwd){sessionStorage.setItem('role','customer');sessionStorage.setItem('user',USERS.customer.name);startApp();}else if(id===USERS.admin.id&&pwd===USERS.admin.pwd){sessionStorage.setItem('role','admin');sessionStorage.setItem('user',USERS.admin.name);startApp();}else loginErr.style.display='block';}
function logout(){sessionStorage.clear();location.reload();}
function startApp(){loginPage.classList.add('hidden');app.classList.remove('hidden');buildSidebar();renderAll();}
function buildSidebar(){const role=sessionStorage.getItem('role');let items=[];if(role==='customer'){items=['dashboard','beneficiaries','transfer','transactions','cards','loans','services','profile'];}else{items=['admin','transactions','services'];} sidebar.innerHTML=items.map((x,i)=>`<div class='menu ${i===0?'active':''}' onclick="showView('${x}',this)">${x.charAt(0).toUpperCase()+x.slice(1)}</div>`).join('')+`<div class='menu' onclick='logout()'>Logout</div>`;showView(items[0],sidebar.querySelector('.menu'));}
function showView(id,el){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active')); if(el) el.classList.add('active');}
function fmt(n){return '₹ '+Number(n).toLocaleString('en-IN');}
function renderAll(){renderDashboard();renderBeneficiaries();renderTransfer();renderTransactions();renderCards();renderLoans();renderServices();renderProfile();renderAdmin();}
function renderDashboard(){const d=data();dashboard.innerHTML=`<div class='accounts'><div class='acct'><h3>Savings</h3><h2>${fmt(d.balance)}</h2></div><div class='acct'><h3>Current</h3><h2>${fmt(d.current)}</h2></div><div class='acct'><h3>Loan Outstanding</h3><h2>${fmt(d.loan.outstanding)}</h2></div></div><div class='card'><h2>Welcome, ${sessionStorage.getItem('user')}</h2><p>Quick enterprise banking actions available.</p></div>`;}
function renderBeneficiaries(){const d=data();beneficiaries.innerHTML=`<div class='card'><h2>Add Beneficiary</h2><input id='benName' placeholder='Beneficiary Name'><input id='benAcct' placeholder='Account Number'><input id='benAcct2' placeholder='Confirm Account Number'><input id='benIfsc' placeholder='IFSC'><button onclick='addBeneficiary()'>Add Beneficiary</button><div id='benErr' class='error'></div></div><div class='card'><h2>Beneficiaries</h2>${d.beneficiaries.map(b=>`<div class='tableRow'>${b.name} | ${b.account} | ${b.ifsc}</div>`).join('')}</div>`;}
function addBeneficiary(){const n=benName.value.trim(),a=benAcct.value.trim(),a2=benAcct2.value.trim(),i=benIfsc.value.trim().toUpperCase(); if(!n||a!==a2||!/^[A-Z]{4}0[A-Z0-9]{6}$/.test(i)){benErr.innerText='Invalid beneficiary details';benErr.style.display='block';return;} const d=data(); if(d.beneficiaries.some(x=>x.account===a)){benErr.innerText='Duplicate beneficiary';benErr.style.display='block';return;} d.beneficiaries.push({name:n,account:a,ifsc:i}); save(d); toast('Beneficiary added'); renderBeneficiaries(); renderTransfer();}
function renderTransfer(){const d=data();transfer.innerHTML=`<div class='card'><h2>Fund Transfer</h2><select id='tfBen'><option value=''>Select Beneficiary</option>${d.beneficiaries.map((b,i)=>`<option value='${i}'>${b.name} - ${b.account}</option>`).join('')}</select><select id='tfType'><option>IMPS</option><option>NEFT</option><option>RTGS</option></select><input id='tfAmount' type='number' placeholder='Amount'><input id='tfRemarks' placeholder='Remarks'><button onclick='sendOtp()'>Proceed</button><div id='otpSec' class='hidden'><p>Enter OTP (Demo: 123456)</p><div class='otpBox'><input id='tfOtp' maxlength='6'><button onclick='confirmTransfer()'>Confirm</button></div></div><div id='tfErr' class='error'></div></div>`;}
function sendOtp(){const d=data(); if(tfBen.value===''||!tfAmount.value||Number(tfAmount.value)>d.balance){tfErr.innerText='Invalid transfer request';tfErr.style.display='block';return;} tfErr.style.display='none'; otpSec.classList.remove('hidden'); toast('Demo OTP: 123456');}
function confirmTransfer(){if(tfOtp.value!=='123456'){tfErr.innerText='Incorrect OTP';tfErr.style.display='block';return;} const d=data(); const amt=Number(tfAmount.value); const b=d.beneficiaries[tfBen.value]; d.balance-=amt; d.transactions.unshift({date:new Date().toLocaleString(),beneficiary:b.name,amount:amt,type:tfType.value,utr:'TXN'+Date.now()}); save(d); toast('Transfer successful'); renderAll(); showView('transactions');}
function renderTransactions(){const d=data();transactions.innerHTML=`<div class='card'><h2>Transactions</h2><button class='secondary' onclick='downloadStatement()'>Download PDF Statement</button>${d.transactions.length?d.transactions.map(t=>`<div class='tableRow'><strong>${t.date}</strong><br>${t.type} | ${t.beneficiary} | ${fmt(t.amount)} | <span class='badge'>${t.utr}</span></div>`).join(''):'<p>No transactions yet</p>'}</div>`;}
function downloadStatement(){const {jsPDF}=window.jspdf; const d=data(); const doc=new jsPDF(); doc.text('DemoBank Statement',20,20); let y=40; d.transactions.slice(0,10).forEach(t=>{doc.text(`${t.date} | ${t.beneficiary} | Rs ${t.amount}`,20,y); y+=10;}); doc.save('statement.pdf');}
function renderCards(){const d=data();cards.innerHTML=`<div class='card'><h2>Card Controls</h2><div class='toggle'><span>Card Status</span><button class='${d.card.blocked?'success':'danger'}' onclick='toggleCard()'>${d.card.blocked?'Unblock':'Block'} Card</button></div><div class='toggle'><span>Online Usage</span><button onclick='toggleOnline()'>${d.card.online?'Enabled':'Disabled'}</button></div><div class='toggle'><span>International Usage</span><button onclick='toggleIntl()'>${d.card.intl?'Enabled':'Disabled'}</button></div><input id='limit' type='number' value='${d.card.limit}'><button onclick='saveLimit()'>Save Daily Limit</button></div>`;}
function toggleCard(){const d=data();d.card.blocked=!d.card.blocked;save(d);renderCards();}
function toggleOnline(){const d=data();d.card.online=!d.card.online;save(d);renderCards();}
function toggleIntl(){const d=data();d.card.intl=!d.card.intl;save(d);renderCards();}
function saveLimit(){const d=data();d.card.limit=Number(limit.value);save(d);toast('Limit updated');}
function renderLoans(){const d=data();loans.innerHTML=`<div class='card'><h2>${d.loan.type}</h2><p>Outstanding: ${fmt(d.loan.outstanding)}</p><p>Monthly EMI: ${fmt(d.loan.emi)}</p><button onclick='payEmi()'>Pay EMI</button><button class='secondary' onclick='downloadLoanPdf()'>Download Sanction Letter</button></div>`;}
function payEmi(){const d=data(); if(d.balance<d.loan.emi){toast('Insufficient balance');return;} d.balance-=d.loan.emi; d.loan.outstanding-=d.loan.emi; save(d); toast('EMI paid'); renderAll();}
function downloadLoanPdf(){const {jsPDF}=window.jspdf; const d=data(); const doc=new jsPDF(); doc.text('Loan Sanction Letter',20,20); doc.text('Outstanding: '+fmt(d.loan.outstanding),20,40); doc.save('loan-letter.pdf');}
function renderServices(){const d=data();services.innerHTML=`<div class='card'><h2>Service Requests</h2><select id='srvType'><option>Cheque Book</option><option>Card Replacement</option><option>Address Update</option><option>Dispute Transaction</option></select><textarea id='srvDesc' placeholder='Description'></textarea><button onclick='raiseService()'>Raise Request</button></div><div class='card'><h2>Request History</h2>${d.services.map(s=>`<div class='tableRow'>${s.id} | ${s.type} | ${s.status}</div>`).join('')||'<p>No requests</p>'}</div>`;}
function raiseService(){const d=data(); const id='SR'+Date.now(); d.services.unshift({id,type:srvType.value,status:'Open'}); save(d); toast('Request raised: '+id); renderServices(); renderAdmin();}
function renderProfile(){const p=data().profile; profile.innerHTML=`<div class='card'><h2>Profile / KYC</h2><input id='pName' value='${p.name}'><input id='pMobile' value='${p.mobile}'><input id='pEmail' value='${p.email}'><input value='${p.pan}' disabled><input value='${p.aadhaar}' disabled><input id='pAddress' value='${p.address}'><input id='pNominee' value='${p.nominee}'><button onclick='saveProfile()'>Save Profile</button><p class='small'>Profile updates are simulated without OTP for demo.</p></div>`;}
function saveProfile(){const d=data(); d.profile={...d.profile,name:pName.value,mobile:pMobile.value,email:pEmail.value,address:pAddress.value,nominee:pNominee.value}; save(d); toast('Profile updated');}
function renderAdmin(){const d=data(); admin.innerHTML=`<div class='card'><h2>Admin Dashboard</h2><p>Total Beneficiaries: ${d.beneficiaries.length}</p><p>Total Transactions: ${d.transactions.length}</p><p>Open Service Requests: ${d.services.filter(x=>x.status==='Open').length}</p></div><div class='card'><h2>Audit Logs</h2>${d.transactions.map(t=>`<div class='tableRow'>${t.date} | ${t.beneficiary} | ${fmt(t.amount)}</div>`).join('')||'<p>No audit records</p>'}</div>`;}
if(sessionStorage.getItem('role')) startApp();
</script>
</body>
</html>
