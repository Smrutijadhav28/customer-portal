<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemoBank Enterprise Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#eef2f7;
  color:#0f172a;
}

.header{
  height:72px;
  background:#071b3a;
  color:white;
  display:flex;
  align-items:center;
  padding:0 24px;
}

.logo{
  font-size:20px;
  font-weight:700;
}

.layout{
  display:flex;
  min-height:calc(100vh - 72px);
}

.sidebar{
  width:260px;
  background:#122b57;
  padding:24px 18px;
}

.sidebar button{
  width:100%;
  margin-bottom:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:transparent;
  color:white;
  text-align:left;
  cursor:pointer;
  font-size:15px;
}

.sidebar button:hover{
  background:#254884;
}

.main{
  flex:1;
  padding:28px;
}

.card{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 30px rgba(15,23,42,0.08);
  margin-bottom:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

.statCard{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  border-radius:18px;
  padding:22px;
}

.statCard h3{
  font-size:14px;
  margin-bottom:8px;
}

.statCard p{
  font-size:28px;
  font-weight:700;
}

input,select{
  width:100%;
  padding:14px;
  border:1px solid #cbd5e1;
  border-radius:12px;
  margin-bottom:16px;
  font-size:15px;
}

button.primary{
  background:#2563eb;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

button.secondary{
  background:#e2e8f0;
  color:#0f172a;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

button.success{
  background:#16a34a;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
}

.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#dc2626;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  display:none;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#dcfce7;
  color:#166534;
  font-size:12px;
  font-weight:600;
}

.tableRow{
  padding:18px;
  border:1px solid #e2e8f0;
  border-radius:16px;
  margin-bottom:14px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0f172a;
  color:white;
  padding:14px 18px;
  border-radius:12px;
  z-index:999;
}

.loginWrap{
  min-height:calc(100vh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.loginCard{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:24px;
  padding:34px;
  box-shadow:0 20px 50px rgba(15,23,42,0.12);
}

.steps{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.step{
  padding:10px 14px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
  font-size:13px;
  font-weight:700;
}

.reviewBox{
  background:#f8fafc;
  border:1px solid #dbeafe;
  border-radius:16px;
  padding:18px;
  margin:18px 0;
}

.reviewBox p{
  margin-bottom:10px;
}

@media(max-width:900px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    overflow:auto;
    gap:10px;
  }

  .sidebar button{
    min-width:170px;
    margin-bottom:0;
  }

  .main{
    padding:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DemoBank Enterprise Portal</div>
</div>

<div id="app"></div>

<script>

let currentUser = null;
let transferDraft = {};
let transferOtpAttempts = 3;
let otpExpiry = null;

function seedData(){

  if(localStorage.getItem("demoBankData")) return;

  const data = {
    balance:445850,
    openingBalance:400000,
    dailyTransferred:0,

    profile:{
      name:"Smruti Jadhav",
      customerId:"CUST1001",
      account:"XXXX5421",
      branch:"Mumbai Main Branch",
      ifsc:"DEMO0001234",
      mobile:"9876543210"
    },

    beneficiaries:[
      {
        name:"Sachin Patil",
        bank:"Kotak Mahindra Bank",
        account:"XXXX4704",
        activeAt:Date.now()-1000
      }
    ],

    transactions:[]
  };

  localStorage.setItem(
    "demoBankData",
    JSON.stringify(data)
  );
}

seedData();

function getData(){
  return JSON.parse(
    localStorage.getItem("demoBankData")
  );
}

function saveData(data){
  localStorage.setItem(
    "demoBankData",
    JSON.stringify(data)
  );
}

function fmt(n){
  return "INR " + Number(n).toLocaleString("en-IN");
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;

  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },2500);
}
  function renderLogin(){

  document.getElementById("app").innerHTML = `
    <div class="loginWrap">
      <div class="loginCard">

        <h2 style="margin-bottom:12px;">Secure Login</h2>

        <p style="margin-bottom:24px;color:#475569;">
          Customer: CUST1001 / Demo@123
          <br>
          Admin: ADMIN01 / Admin@123
        </p>

        <input
          id="loginId"
          placeholder="User ID"
        >

        <input
          id="loginPwd"
          type="password"
          placeholder="Password"
        >

        <button
          class="primary"
          onclick="login()"
        >
          Login
        </button>

        <div id="loginErr" class="error">
          Invalid credentials
        </div>

      </div>
    </div>
  `;
}

function login(){

  const user =
    document.getElementById("loginId").value.trim();

  const pass =
    document.getElementById("loginPwd").value.trim();

  const err =
    document.getElementById("loginErr");

  err.style.display = "none";

  if(user === "CUST1001" && pass === "Demo@123"){
    currentUser = "customer";
    loadApp();
    toast("Customer login successful");
    return;
  }

  if(user === "ADMIN01" && pass === "Admin@123"){
    currentUser = "admin";
    loadApp();
    toast("Admin login successful");
    return;
  }

  err.style.display = "block";
}

function logout(){
  currentUser = null;
  renderLogin();
}

function loadApp(){

  document.getElementById("app").innerHTML = `
    <div class="layout">

      <div class="sidebar">

        <button onclick="renderDashboard()">
          Dashboard
        </button>

        <button onclick="renderBeneficiaries()">
          Beneficiaries
        </button>

        <button onclick="renderTransfer()">
          Transfer
        </button>

        <button onclick="renderTransactions()">
          Transactions
        </button>

        <button onclick="renderCards()">
          Cards
        </button>

        <button onclick="renderLoans()">
          Loans
        </button>

        <button onclick="renderServices()">
          Services
        </button>

        <button onclick="renderProfile()">
          Profile
        </button>

        ${
          currentUser === "admin"
          ?
          `
          <button onclick="renderAdminDashboard()">
            Admin
          </button>
          `
          :
          ""
        }

        <button onclick="logout()">
          Logout
        </button>

      </div>

      <div class="main" id="mainContent"></div>

    </div>
  `;

  renderDashboard();
}

/* DASHBOARD */
function renderDashboard(){

  const d = getData();
  const p = d.profile;

  document.getElementById("mainContent").innerHTML = `
    <div class="grid">

      <div class="statCard">
        <h3>Savings Balance</h3>
        <p>${fmt(d.balance)}</p>
      </div>

      <div class="statCard">
        <h3>Opening Balance</h3>
        <p>${fmt(d.openingBalance)}</p>
      </div>

      <div class="statCard">
        <h3>Daily Transfer Used</h3>
        <p>${fmt(d.dailyTransferred)}</p>
      </div>

    </div>

    <div class="card">
      <h2>Welcome, ${p.name}</h2>

      <p>
        Customer ID: ${p.customerId}
        <br><br>
        Account: ${p.account}
        <br><br>
        Branch: ${p.branch}
        <br><br>
        IFSC: ${p.ifsc}
      </p>
    </div>
  `;
}

/* BENEFICIARIES */
function renderBeneficiaries(){

  const d = getData();

  let rows = "";

  d.beneficiaries.forEach((b)=>{

    const active =
      Date.now() >= b.activeAt
      ? `<span class="badge">Active</span>`
      : `<span style="color:#dc2626;">Pending</span>`;

    rows += `
      <div class="tableRow">
        <strong>${b.name}</strong>
        <br><br>
        ${b.bank}
        <br>
        ${b.account}
        <br><br>
        ${active}
      </div>
    `;
  });

  document.getElementById("mainContent").innerHTML = `
    <div class="card">
      <h2>Add Beneficiary</h2>

      <input id="benName" placeholder="Beneficiary Name">
      <input id="benBank" placeholder="Bank Name">
      <input id="benAcct" placeholder="Masked Account">

      <button class="primary" onclick="addBeneficiary()">
        Add Beneficiary
      </button>

      <div id="benErr" class="error"></div>
    </div>

    <div class="card">
      <h2>Existing Beneficiaries</h2>
      ${rows}
    </div>
  `;
}

function addBeneficiary(){

  const d = getData();

  const name = benName.value.trim();
  const bank = benBank.value.trim();
  const acct = benAcct.value.trim();

  const err = document.getElementById("benErr");

  err.style.display = "none";

  if(!name || !bank || !acct){
    err.innerText = "All fields required";
    err.style.display = "block";
    return;
  }

  d.beneficiaries.push({
    name:name,
    bank:bank,
    account:acct,
    activeAt:Date.now()+30000
  });

  saveData(d);

  toast("Beneficiary added");

  renderBeneficiaries();
}

/* ADMIN */
function renderAdminDashboard(){

  const d = getData();

  document.getElementById("mainContent").innerHTML = `
    <div class="card">
      <h2>Admin Dashboard</h2>

      <p style="margin-bottom:20px;">
        Customer Balance: ${fmt(d.balance)}
      </p>

      <select id="adminTxnType">
        <option value="ADMIN CREDIT">Credit Funds</option>
        <option value="ADMIN DEBIT">Debit Funds</option>
      </select>

      <input
        id="adminTxnAmount"
        type="number"
        placeholder="Amount"
      >

      <input
        id="adminTxnReason"
        placeholder="Reason"
      >

      <button
        class="primary"
        onclick="executeAdminTxn()"
      >
        Execute Transaction
      </button>

      <div id="adminErr" class="error"></div>
    </div>
  `;
}

function executeAdminTxn(){

  const d = getData();

  const type = adminTxnType.value;
  const amt = Number(adminTxnAmount.value);
  const reason = adminTxnReason.value.trim();

  const err = document.getElementById("adminErr");

  err.style.display = "none";

  if(!amt || amt <= 0){
    err.innerText = "Enter valid amount";
    err.style.display = "block";
    return;
  }

  if(!reason){
    err.innerText = "Reason required";
    err.style.display = "block";
    return;
  }

  if(type === "ADMIN DEBIT" && amt > d.balance){
    err.innerText = "Debit exceeds balance";
    err.style.display = "block";
    return;
  }

  if(type === "ADMIN CREDIT"){
    d.balance += amt;
  }else{
    d.balance -= amt;
  }

  d.transactions.unshift({
    date:new Date().toLocaleString(),
    beneficiary:"CUST1001",
    amount:amt,
    type:type,
    utr:"ADM"+Date.now(),
    status:"Success",
    remarks:reason
  });

  saveData(d);

  toast("Admin transaction completed");

  renderAdminDashboard();
}

/* PLACEHOLDERS */
function renderTransfer(){

  const d = getData();

  let benOptions =
    `<option value="">Select Beneficiary</option>`;

  d.beneficiaries.forEach((b, idx)=>{
    benOptions += `
      <option value="${idx}">
        ${b.name} - ${b.bank} (${b.account})
      </option>
    `;
  });

  document.getElementById("mainContent").innerHTML = `
    <div class="card">
      <h2>Fund Transfer</h2>

      <div class="steps">
        <div class="step">1 Details</div>
        <div class="step">2 OTP</div>
        <div class="step">3 Review</div>
        <div class="step">4 Success</div>
      </div>

      <div id="transferBody">

        <select id="tfBen">
          ${benOptions}
        </select>

        <select id="tfType">
          <option value="IMPS">IMPS</option>
          <option value="NEFT">NEFT</option>
          <option value="RTGS">RTGS</option>
        </select>

        <input
          id="tfAmount"
          type="text"
          placeholder="Enter Amount"
        >

        <input
          id="tfRemarks"
          placeholder="Remarks"
        >

        <input
          id="tfPan"
          placeholder="PAN (required above INR 50,000)"
        >

        <button
          class="primary"
          onclick="continueTransferOtp()"
        >
          Continue
        </button>

      </div>

      <div id="tfErr" class="error"></div>

    </div>
  `;
}

function validateTransferDetails(){

  const d = getData();

  const benIndex = tfBen.value;
  const type = tfType.value;
  const amountRaw = tfAmount.value.trim();
  const pan = tfPan.value.trim().toUpperCase();

  if(benIndex === ""){
    return "Please select beneficiary.";
  }

  const ben = d.beneficiaries[benIndex];

  if(Date.now() < ben.activeAt){
    return "Beneficiary is not active yet.";
  }

  if(!/^\\d+(\\.\\d{1,2})?$/.test(amountRaw)){
    return "Enter valid amount (max 2 decimals).";
  }

  const amount = Number(amountRaw);

  if(amount < 1){
    return "Minimum transfer amount is INR 1.00";
  }

  if(amount > d.balance){
    return "Insufficient balance.";
  }

  if(d.dailyTransferred + amount > 1000000){
    return "Daily transfer limit exceeded.";
  }

  if(amount > 50000){
    if(!/^[A-Z]{5}[0-9]{4}[A-Z]$/.test(pan)){
      return "Valid PAN required above INR 50,000.";
    }
  }

  if(type === "IMPS" && amount > 500000){
    return "IMPS limit is INR 5,00,000.";
  }

  if(type === "RTGS" && amount < 200000){
    return "RTGS minimum is INR 2,00,000.";
  }

  return "";
}

function continueTransferOtp(){

  const err = validateTransferDetails();
  const errBox = document.getElementById("tfErr");

  if(err){
    errBox.innerText = err;
    errBox.style.display = "block";
    return;
  }

  errBox.style.display = "none";

  const d = getData();
  const ben = d.beneficiaries[tfBen.value];

  transferDraft = {
    beneficiary: ben,
    type: tfType.value,
    amount: Number(tfAmount.value),
    remarks: tfRemarks.value.trim()
  };

  otpExpiry = Date.now() + 60000;
  transferOtpAttempts = 3;

  document.getElementById("transferBody").innerHTML = `
    <h3>OTP Verification</h3>

    <p style="margin-bottom:18px;">
      OTP sent to registered mobile XXXX3210
    </p>

    <input
      id="transferOtp"
      maxlength="6"
      placeholder="Enter OTP"
    >

    <button
      class="primary"
      onclick="verifyTransferOtp()"
    >
      Verify OTP
    </button>

    <button
      class="secondary"
      onclick="resendTransferOtp()"
    >
      Resend OTP
    </button>
  `;

  toast("Demo OTP: 123456");
}

function resendTransferOtp(){
  otpExpiry = Date.now() + 60000;
  transferOtpAttempts = 3;
  toast("OTP resent: 123456");
}

function verifyTransferOtp(){

  const errBox = document.getElementById("tfErr");

  if(Date.now() > otpExpiry){
    errBox.innerText = "OTP expired. Resend OTP.";
    errBox.style.display = "block";
    return;
  }

  const otp = transferOtp.value.trim();

  if(otp !== "123456"){

    transferOtpAttempts--;

    errBox.innerText =
      transferOtpAttempts > 0
      ?
      "Incorrect OTP. Attempts left: " +
      transferOtpAttempts
      :
      "OTP locked.";

    errBox.style.display = "block";
    return;
  }

  errBox.style.display = "none";

  showTransferReview();
}

function showTransferReview(){

  document.getElementById("transferBody").innerHTML = `
    <h3>Review & Pay</h3>

    <div class="reviewBox">

      <p><strong>Beneficiary:</strong>
      ${transferDraft.beneficiary.name}</p>

      <p><strong>Bank:</strong>
      ${transferDraft.beneficiary.bank}</p>

      <p><strong>Account:</strong>
      ${transferDraft.beneficiary.account}</p>

      <p><strong>Transfer Type:</strong>
      ${transferDraft.type}</p>

      <p><strong>Amount:</strong>
      ${fmt(transferDraft.amount)}</p>

      <p><strong>Remarks:</strong>
      ${transferDraft.remarks || "-"}</p>

    </div>

    <button
      class="success"
      onclick="executeTransferPayment()"
    >
      Pay Now
    </button>
  `;
}

function executeTransferPayment(){

  const d = getData();

  const txnId = "TXN" + Date.now();

  d.balance -= transferDraft.amount;
  d.dailyTransferred += transferDraft.amount;

  d.transactions.unshift({
    date:new Date().toLocaleString(),
    beneficiary:transferDraft.beneficiary.name,
    amount:transferDraft.amount,
    type:transferDraft.type,
    utr:txnId,
    status:"Success",
    remarks:transferDraft.remarks
  });

  saveData(d);

  document.getElementById("transferBody").innerHTML = `
    <h3>Payment Successful</h3>

    <div class="reviewBox">
      <p><strong>Transaction ID:</strong> ${txnId}</p>
      <p><strong>Amount:</strong> ${fmt(transferDraft.amount)}</p>
      <p><strong>Beneficiary:</strong>
      ${transferDraft.beneficiary.name}</p>
    </div>

    <button
      class="primary"
      onclick="renderTransfer()"
    >
      Done
    </button>
  `;

  toast("Transfer successful");
}

function renderTransactions(filteredList = null){

  const d = getData();
  const txns = filteredList || d.transactions;

  let rows = "";

  if(txns.length === 0){
    rows = `
      <div class="tableRow">
        No transactions found
      </div>
    `;
  }else{

    txns.forEach((t)=>{

      rows += `
        <div class="tableRow">

          <strong>${t.date}</strong>
          <br><br>

          ${t.type}
          <br>

          Beneficiary:
          ${t.beneficiary || "-"}

          <br>

          Amount:
          ${fmt(t.amount)}

          <br>

          Status:
          ${t.status}

          <br><br>

          <span class="badge">
            ${t.utr}
          </span>

          <br><br>

          <button
            class="primary"
            onclick="downloadTransactionReceipt('${t.utr}')"
          >
            Download Receipt
          </button>

        </div>
      `;
    });
  }

  document.getElementById("mainContent").innerHTML = `
    <div class="card">

      <h2>Transactions</h2>

      <div class="grid">

        <div>
          <input
            type="date"
            id="txnFromDate"
          >
        </div>

        <div>
          <input
            type="date"
            id="txnToDate"
          >
        </div>

        <div>
          <select id="txnType">
            <option value="">All Types</option>
            <option>IMPS</option>
            <option>NEFT</option>
            <option>RTGS</option>
            <option>ADMIN CREDIT</option>
            <option>ADMIN DEBIT</option>
          </select>
        </div>

        <div>
          <input
            id="txnBeneficiary"
            placeholder="Beneficiary Search"
          >
        </div>

      </div>

      <button
        class="primary"
        onclick="applyTransactionFilters()"
      >
        Apply Filter
      </button>

      <button
        class="secondary"
        onclick="renderTransactions()"
      >
        Reset
      </button>

      <button
        class="success"
        onclick="downloadFilteredStatement()"
      >
        Download PDF
      </button>

      <br><br>

      ${rows}

    </div>
  `;
}

function applyTransactionFilters(){

  const d = getData();

  const fromDate =
    txnFromDate.value;

  const toDate =
    txnToDate.value;

  const type =
    txnType.value;

  const beneficiary =
    txnBeneficiary.value
      .trim()
      .toLowerCase();

  let filtered = d.transactions.filter((t)=>{

    let match = true;

    if(type && t.type !== type){
      match = false;
    }

    if(
      beneficiary &&
      !(t.beneficiary || "")
        .toLowerCase()
        .includes(beneficiary)
    ){
      match = false;
    }

    if(fromDate){
      if(new Date(t.date) < new Date(fromDate)){
        match = false;
      }
    }

    if(toDate){
      const end = new Date(toDate);
      end.setHours(23,59,59);

      if(new Date(t.date) > end){
        match = false;
      }
    }

    return match;
  });

  renderTransactions(filtered);
}

function downloadTransactionReceipt(utr){

  const d = getData();

  const txn =
    d.transactions.find(x=>x.utr===utr);

  if(!txn){
    alert("Transaction not found");
    return;
  }

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  doc.setFontSize(20);
  doc.text("DemoBank",20,20);

  doc.setFontSize(14);
  doc.text("Transaction Receipt",20,35);

  doc.line(20,40,190,40);

  let y = 60;

  const rows = [
    ["Transaction ID", txn.utr],
    ["Date", txn.date],
    ["Beneficiary", txn.beneficiary],
    ["Type", txn.type],
    ["Amount", fmt(txn.amount)],
    ["Status", txn.status],
    ["Remarks", txn.remarks || "-"]
  ];

  rows.forEach((r)=>{
    doc.text(r[0],20,y);
    doc.text(String(r[1]),90,y);
    y += 12;
  });

  doc.save("Receipt_"+txn.utr+".pdf");
}

function downloadFilteredStatement(){

  const d = getData();

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation:"landscape"
  });

  doc.setFontSize(18);
  doc.text("DemoBank Statement",14,20);

  let y = 40;

  d.transactions.forEach((t)=>{

    doc.text(
      `${t.date} | ${t.type} | ${t.beneficiary} | ${fmt(t.amount)} | ${t.status}`,
      14,
      y
    );

    y += 10;
  });

  if(d.transactions.length === 0){
    doc.text("No transactions",14,40);
  }

  doc.save("Statement.pdf");
}
